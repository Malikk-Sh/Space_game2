function gw(s){
  let w=0;
  for(const ch of s.toUpperCase()){
    const g=GL[ch];
    w+=(!g||Array.isArray(g))?5:(g.w+1);
  }
  return w;
}
function txt(s,x,y,col,sc=1){
  cx.fillStyle=col;let px=x|0;y=y|0;
  for(const ch of s.toUpperCase()){
    const g=GL[ch];
    if(!g){px+=5*sc;continue;}
    if(Array.isArray(g)){
      // Стандартный 4-битный глиф (без изменений)
      for(let r=0;r<5;r++)for(let c=0;c<4;c++)
        if(g[r]&(8>>c))cx.fillRect(px+c*sc,y+r*sc,sc,sc);
      px+=5*sc;
    } else {
      // Широкий глиф {w, rows}
      const msb=1<<(g.w-1);
      for(let r=0;r<5;r++)for(let c=0;c<g.w;c++)
        if(g.rows[r]&(msb>>c))cx.fillRect(px+c*sc,y+r*sc,sc,sc);
      px+=(g.w+1)*sc;
    }
  }
}
function txs(s,x,y,col,shadow,sc=1){txt(s,x+1,y+1,shadow,sc);txt(s,x,y,col,sc);}
function txc(s,y,col,sc=1){txt(s,((LW-gw(s)*sc)/2)|0,y,col,sc);}
function txcs(s,y,col,shadow,sc=1){txs(s,((LW-gw(s)*sc)/2)|0,y,col,shadow,sc);}

let AC=null,musicVol=0.65;

const MUSIC_CONFIG={
  prologue: [
    'music/prologue_01.mp3',
  ],
  gameplay: [
    'music/gameplay_01.mp3',
    // 'music/gameplay_02.mp3',  // раскомментируй чтобы добавить трек
  ],

let _mAudio=null;   // текущий Audio-элемент
let _mState=null;   // текущий стейт музыки
let _mIdx=0;        // индекс трека внутри стейта

function _getMusicState(G){
  if(!G)return 'prologue';
  const s=G.state;
  if(s==='title'||s==='intro'||s==='menu')return 'prologue';
  if(s==='credits'||s==='gameover')return 'epilogue';
  if(s==='finale_tina'){
    if(G.finale&&(G.finale.showingVictory||G.finale.catSceneStarted||G.finale.epilogueStarted))return 'epilogue';
    return 'battle';
  }
  return 'gameplay';
}
function _playTrack(stateName,idx){
  const tracks=MUSIC_CONFIG[stateName];
  if(!tracks||tracks.length===0)return;
  if(_mAudio){_mAudio.pause();_mAudio.onended=null;_mAudio=null;}
  _mState=stateName;
  _mIdx=((idx%tracks.length)+tracks.length)%tracks.length;
  const a=new Audio(tracks[_mIdx]);
  a.volume=MUSIC_ON?musicVol:0;
  a.onended=()=>_playTrack(stateName,_mIdx+1); // следующий трек по кругу
  a.play().catch(()=>{});
  _mAudio=a;
}
function updateMusicForGame(G){
  const needed=_getMusicState(G);
  if(needed!==_mState){
    _playTrack(needed,0);
  }else if(_mAudio){
    _mAudio.volume=MUSIC_ON?musicVol:0;
    if(_mAudio.paused&&MUSIC_ON)_mAudio.play().catch(()=>{});
  }else{
    _playTrack(needed,0);
  }
}
function cycleMusicTrack(G){
  const state=_mState||_getMusicState(G);
  const tracks=MUSIC_CONFIG[state];
  if(!tracks||tracks.length===0){sfxUI();return;}
  _playTrack(state,_mIdx+1);
  sfxUI();
}
function getCurrentTrackName(){
  const tracks=MUSIC_CONFIG[_mState];
  if(!tracks||tracks.length===0)return '—';
  return (_mIdx+1)+'/'+tracks.length;
}

function bip(f,d,v=0.2,tp='square',f0=null,f1=null){if(!AC||!SFX_ON)return;try{const o=AC.createOscillator(),g=AC.createGain(),t=AC.currentTime;o.type=tp;if(f0){o.frequency.setValueAtTime(f0,t);o.frequency.exponentialRampToValueAtTime(Math.max(20,f1||f),t+d*.8);}else o.frequency.setValueAtTime(f,t);g.gain.setValueAtTime(v,t);g.gain.exponentialRampToValueAtTime(0.001,t+d);o.connect(g);g.connect(AC.destination);o.start(t);o.stop(t+d+.01);}catch(e){}}
function noise(d,v=.2,f=2000){if(!AC||!SFX_ON)return;try{const bs=AC.sampleRate*d,buf=AC.createBuffer(1,bs,AC.sampleRate);const data=buf.getChannelData(0);for(let i=0;i<bs;i++)data[i]=(Math.random()*2-1)*(1-i/bs);const src=AC.createBufferSource(),g=AC.createGain(),flt=AC.createBiquadFilter();src.buffer=buf;flt.type='lowpass';flt.frequency.value=f;g.gain.setValueAtTime(v,AC.currentTime);g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+d);src.connect(flt);flt.connect(g);g.connect(AC.destination);src.start();}catch(e){}}

const K={},KD={};let mX=0,mY=0,mC=false;let ALLOW_JOY=true;let TAP_FIRE=false;
addEventListener('keydown',e=>{if(!K[e.code])KD[e.code]=true;K[e.code]=true;if(['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Tab'].includes(e.code))e.preventDefault();});

const TOUCH={joyId:-1,joyActive:false,joyBaseX:0,joyBaseY:0,joyX:0,joyY:0,joyDX:0,joyDY:0,btns:[],pointerTouchIds:{},fire:false,fireId:-1};
function setJoyEnabled(enabled){ALLOW_JOY=enabled;if(!enabled){TOUCH.joyId=-1;TOUCH.joyActive=false;TOUCH.joyDX=0;TOUCH.joyDY=0;}}
function canvasCoord(clientX,clientY){const r=CV.getBoundingClientRect();return{x:(clientX-r.left)*(LW/r.width),y:(clientY-r.top)*(LH/r.height)};}
function handlePointerDown(id, x, y){
  mX=x;mY=y;
  // Если игра на паузе — пропускаем джойстик, fire, кнопки сцены: только mC для опций меню паузы.
  if(window.G && window.G.paused){
    mC=true;
    return;
  }
  // Если активен туториал — ЛЮБОЙ клик/тап должен переключать его шаг.
  // Иначе джойстик/TAP_FIRE/кнопки перехватят тап и mC никогда не выставится.
  if(window.G && window.G.tutorial && window.G.tutorial.visible){
    mC=true;
    return;
  }
  // Иконка паузы должна нажиматься поверх джойстика, особенно в космосе на мобильных.
  if(mX>=PAUSE_ICON_X-8&&mX<=PAUSE_ICON_X+PAUSE_ICON_W+8&&mY>=PAUSE_ICON_Y-8&&mY<=PAUSE_ICON_Y+PAUSE_ICON_H+8){
    mC=true;
    return;
  }
  for(let i=0;i<TOUCH.btns.length;i++){
    const b=TOUCH.btns[i];
    if(!b.enabled)continue;
    if(b.hidden && !(b.id&&b.id.indexOf('ch')===0))continue;
    if(Math.hypot(mX-b.x,mY-b.y)<=b.r){
      b.pressed=true;b.justPressed=true;
      TOUCH.pointerTouchIds[id]=i;
      if(b.id==='fire'){TOUCH.fire=true;TOUCH.fireId=id;}
      return;
    }
  }
  // Джойстик: только в левой нижней части экрана
  if(USE_TOUCH_UI&&ALLOW_JOY&&mX<LW*0.42&&mY>LH*0.28){
    TOUCH.joyActive=true;TOUCH.joyId=id;TOUCH.joyBaseX=mX;TOUCH.joyBaseY=mY;TOUCH.joyX=mX;TOUCH.joyY=mY;TOUCH.joyDX=0;TOUCH.joyDY=0;
    return;
  }
  // TAP_FIRE: тап в правой части экрана = стрельба (вне кнопок и джойстика)
  if(USE_TOUCH_UI&&TAP_FIRE&&mX>=LW*0.42){
    TOUCH.fire=true;TOUCH.fireId=id;
    return;
  }
  mC=true;
}
function handlePointerMove(id,x,y){
  if(TOUCH.joyId===id){
    const dx=x-TOUCH.joyBaseX,dy=y-TOUCH.joyBaseY;const MAX=24;const d=Math.hypot(dx,dy);
    if(d>MAX){TOUCH.joyX=TOUCH.joyBaseX+dx/d*MAX;TOUCH.joyY=TOUCH.joyBaseY+dy/d*MAX;TOUCH.joyDX=dx/d;TOUCH.joyDY=dy/d;}
    else{TOUCH.joyX=x;TOUCH.joyY=y;TOUCH.joyDX=dx/MAX;TOUCH.joyDY=dy/MAX;}
  }
  const bi=TOUCH.pointerTouchIds[id];
  if(bi!=null){
    const b=TOUCH.btns[bi];const dx=x-b.x,dy=y-b.y;
    if(dx*dx+dy*dy>(b.r+8)*(b.r+8)){
      b.pressed=false;
      if(b.id==='fire'&&TOUCH.fireId===id){TOUCH.fire=false;TOUCH.fireId=-1;}
      delete TOUCH.pointerTouchIds[id];
    }
  }
  mX=x;mY=y;
}
function handlePointerUp(id){
  if(TOUCH.fireId===id){TOUCH.fire=false;TOUCH.fireId=-1;}
  if(TOUCH.joyId===id){TOUCH.joyId=-1;TOUCH.joyActive=false;TOUCH.joyDX=0;TOUCH.joyDY=0;}
  const bi=TOUCH.pointerTouchIds[id];
  if(bi!=null){if(TOUCH.btns[bi])TOUCH.btns[bi].pressed=false;delete TOUCH.pointerTouchIds[id];}
  // На мобильных уводим курсор за экран, чтобы hover не залипал на кнопке паузы / иконках.

// Разбить строку на 1-2 строчки по ширине пикселей. Делит по пробелам.
// Возвращает массив строк (1 или 2).
function wrapTextNotif(s,maxW){
  if(gw(s)<=maxW)return [s];
  const words=s.split(' ');
  // Ищем точку разреза, при которой вторая строка тоже помещается.
  // Идём от конца к началу — стараемся максимально загрузить первую строку.
  let bestSplit=-1;
  for(let i=words.length-1;i>=1;i--){
    const line1=words.slice(0,i).join(' ');
    const line2=words.slice(i).join(' ');
    if(gw(line1)<=maxW&&gw(line2)<=maxW){
      bestSplit=i;break;
    }
  }
  if(bestSplit>0){
    return [words.slice(0,bestSplit).join(' '),words.slice(bestSplit).join(' ')];
  }
  // Если даже две строки не помещаются — берём максимально возможную первую,
  // и обрезаем конец многоточием если очень длинно.
  let line1='';
  for(let i=0;i<words.length;i++){
    const trial=line1?line1+' '+words[i]:words[i];
    if(gw(trial)<=maxW)line1=trial;else break;
  }
  const line2=words.slice(line1.split(' ').length).join(' ');
  return [line1,line2.length>40?line2.slice(0,38)+'..':line2];
}

// ★ v22 — Ретро-RPG попап «ЗАДАНИЕ ВЫПОЛНЕНО» с анимированными наградами
// rewards: [{label:'...', col:'...'}, ...]
function showQuestReward(G,title,rewards,col){
  G.qrw={active:true,t:0,title:title,rewards:rewards,col:col||P.YEL,
    duration:Math.max(260,200+rewards.length*45),_rev:new Array(rewards.length).fill(false)};
}
function drwQuestReward(G){
  const q=G.qrw;if(!q||!q.active)return;
  const t=q.t,N=q.rewards.length;
  const BW=170,RPAD=14,BH=RPAD+11+N*11+RPAD;
  const BX=(LW-BW)/2|0;
  // Slide-in ease-out cubic
  const slideP=Math.min(1,Math.max(0,(t-1)/15));
  const ease=1-Math.pow(1-slideP,3);
  const targetY=(LH-BH)/2|0;
  const BY=(targetY*ease+(-BH-8)*(1-ease))|0;
  // Dim overlay
  cx.globalAlpha=Math.min(0.82,ease*0.82);
  rc(0,0,LW,LH,'#000814');
  cx.globalAlpha=1;
  if(slideP<0.04)return;
  // — Внешнее свечение (3px, цвет квеста) —
  cx.globalAlpha=0.35*ease;
  rc(BX-3,BY-3,BW+6,BH+6,q.col);
  cx.globalAlpha=1;
  // — Основной бокс —
  rc(BX-1,BY-1,BW+2,BH+2,'#001828');
  rc(BX,BY,BW,BH,'#010d1e');
  // Скан-линии
  cx.globalAlpha=0.07;cx.fillStyle='#aaddff';
  for(let y=0;y<BH;y+=2)cx.fillRect(BX,BY+y,BW,1);
  cx.globalAlpha=1;
  // — Заголовочная полоса —
  rc(BX,BY,BW,12,'#030f22');
  cx.fillStyle=q.col;cx.fillRect(BX,BY,BW,1);       // верхний бордер
  cx.fillStyle=q.col;cx.fillRect(BX,BY+11,BW,1);    // нижний бордер заголовка
  // Левый и правый бордер всего бокса
  cx.fillStyle=q.col;cx.fillRect(BX,BY,1,BH);
  cx.fillStyle=q.col;cx.fillRect(BX+BW-1,BY,1,BH);
  cx.fillStyle=q.col;cx.fillRect(BX,BY+BH-1,BW,1);
  // Уголки яркие (2×2)
  cx.fillStyle='#ffffff';
  cx.fillRect(BX,BY,2,2);cx.fillRect(BX+BW-2,BY,2,2);
  cx.fillRect(BX,BY+BH-2,2,2);cx.fillRect(BX+BW-2,BY+BH-2,2,2);
  // Заголовок с пульсом
  const hblink=slideP>=1?1:Math.min(1,(t-12)/8);
  cx.globalAlpha=hblink;
  txcs('★ '+q.title+' ★',BY+2,q.col,'#001828',1);
  cx.globalAlpha=1;
  // — Строки наград —
  for(let i=0;i<N;i++){
    const r=q.rewards[i];
    const revT=20+i*16;
    if(t<revT)continue;
    if(t===revT&&!q._rev[i]){
      q._rev[i]=true;
      // Нарастающий arpeggio: каждая награда выше
      bip(700+i*140,0.22,0.18,'sine',1000+i*100,650+i*60);
      spPts(BX+BW/2,BY+13+i*11,4,[r.col,P.WHT],.3,1.5,10,.01);
    }
    const age=Math.min(14,t-revT);
    const fa=Math.min(1,age/8);
    const ox=(8-age)*2;  // выезжает слева
    const ry=BY+13+RPAD/2+i*11;
    cx.globalAlpha=fa;
    // Маленький ромб-иконка
    cx.fillStyle=r.col;
    cx.fillRect((BX+10+ox)|0,ry+2,1,5);
    cx.fillRect((BX+11+ox)|0,ry+1,1,7);
    cx.fillRect((BX+12+ox)|0,ry,1,9);  // пик
    cx.fillRect((BX+13+ox)|0,ry+1,1,7);
    cx.fillRect((BX+14+ox)|0,ry+2,1,5);
    // Метка награды
    txs(r.label,(BX+20+ox)|0,ry+1,r.col,'#000d1c',1);
    // Тонкая разделительная линия под строкой
    if(i<N-1){cx.fillStyle='#0a1e30';cx.fillRect(BX+8,ry+10,BW-16,1);}
    cx.globalAlpha=1;
  }
  // — Футер «ПРОДОЛЖИТЬ» —
  const allDone=t>20+N*16+14;
  if(allDone){
    const fb=Math.floor(t/16)%2;
    cx.globalAlpha=fb?1:0.35;
    const FY=BY+BH-RPAD+2;
    rc(BX+1,FY-2,BW-2,1,'#0a1e30');
    txcs('[ ПРОБЕЛ — ПРОДОЛЖИТЬ ]',FY,P.UIT2,'#000814',1);
    cx.globalAlpha=1;
  }
  // — Угловые искры (пока бокс виден) —
  if(t>18&&t%4===0){
    const corners=[[BX+2,BY+2],[BX+BW-2,BY+2],[BX+2,BY+BH-2],[BX+BW-2,BY+BH-2]];
    for(const[cx2,cy2]of corners)
      PTS.push({x:cx2+(Math.random()-.5)*3,y:cy2+(Math.random()-.5)*3,
        vx:(Math.random()-.5)*1.2,vy:-Math.random()*1.4,
        lf:8+Math.random()*6|0,ml:14,col:q.col,sz:1,gv:0,fade:.65});
  }
}

// Универсальная панель уведомления: до 2 строк по центру, с сноской если нужно.
// y=ny — координата верхнего края бокса.
function drwNotif(G,ny){
  if(!(G.notifT>0&&G.notif))return;
  const a=Math.min(1,G.notifT/20);
  cx.globalAlpha=a;
  // Целевая ширина бокса — 80% экрана (не во всю ширину)
  const maxW=Math.floor(LW*0.8);
  const lines=wrapTextNotif(G.notif,maxW-8);
  // Высота бокса: 8px на строку + 6px паддинг
  const boxH=lines.length*8+6;
  // Реальная ширина по самой длинной строке
  let realW=0;for(const l of lines)realW=Math.max(realW,gw(l));
  realW=Math.min(maxW,realW+8);
  const nx=(LW-realW)/2|0;
  if(ny==null)ny=LH/2-boxH/2|0;
  bx2(nx-1,ny-1,realW+2,boxH+2,P.SCAN,G.notifCol,1);
  for(let i=0;i<lines.length;i++){
    txc(lines[i],ny+3+i*8,G.notifCol,1);
  }
  cx.globalAlpha=1;
}

      while(diff<-Math.PI)diff+=Math.PI*2;

    cx.globalAlpha=0.65+0.15*Math.sin(t*0.05+i*0.4);

  // на осколки, видна только звезда внутри (всё рисуется в drwEmergencyProtocol)
  if(eP&&eP.t>=1740){

  }

  // === ВНЕШНЕЕ СВЕЧЕНИЕ — несколько слоёв с разной частотой пульса ===
  cx.globalAlpha=0.10+0.05*Math.sin(t*0.05);

  }

  // === ПУШЕЧНЫЕ ПОРТЫ — крупные, на экваторе ===
  for(let i=0;i<12;i++){
    const a=i/12*Math.PI*2+t*0.006;
    const gx=x+Math.cos(a)*TINA_PORT_R,gy=y+Math.sin(a)*TINA_PORT_R;
    rc((gx-6)|0,(gy-6)|0,12,12,'#330800');
    rc((gx-5)|0,(gy-5)|0,10,10,'#661100');
    rc((gx-3)|0,(gy-3)|0,6,6,P.TINA2);
    if(t%30<8){cx.globalAlpha=0.9;rc((gx-2)|0,(gy-2)|0,4,4,'#ff8844');cx.globalAlpha=1;}
  }

  // === ЭКВАТОРИАЛЬНОЕ КОЛЬЦО — характерная деталь сферы Дайсона ===
  cx.globalAlpha=0.85;
  ring(x,y,TINA_PORT_R,'#441100',2);
  ring(x,y,TINA_PORT_R+3,'#221000',1);
  cx.globalAlpha=1;

  // === ЦЕНТРАЛЬНОЕ ЯДРО — заточенная звезда (намного ярче и больше) ===
  const pulse=0.8+0.2*Math.sin(t*0.12);
  cx.globalAlpha=pulse;
  disc(x,y,(45*pulse)|0,'#ff4422');
  disc(x,y,(33*pulse)|0,'#ff8844');
  disc(x,y,(21*pulse)|0,'#ffcc66');
  disc(x,y,(9*pulse)|0,'#ffffff');
  cx.globalAlpha=1;

  // Лучи звезды — длиннее и динамичнее
  for(let i=0;i<8;i++){
    const a=i/8*Math.PI*2+t*0.02;
    cx.globalAlpha=0.4+0.2*Math.sin(t*0.15+i);
    cx.strokeStyle='#ffaa44';cx.lineWidth=2;
    cx.beginPath();
    cx.moveTo(x+Math.cos(a)*24,y+Math.sin(a)*24);
    cx.lineTo(x+Math.cos(a)*48,y+Math.sin(a)*48);
    cx.stroke();
  }
  cx.globalAlpha=1;

  // === ДУГИ ЭНЕРГИИ ВОКРУГ КОРПУСА (новое - усиление драмы) ===
  if(b.phase>=2){
    for(let i=0;i<3;i++){
      const a1=t*0.025+i*Math.PI*2/3;
      const a2=a1+0.6+Math.sin(t*0.05+i)*0.3;
      const r=TINA_R+5+Math.sin(t*0.1+i*2)*4;
      cx.globalAlpha=0.5+0.3*Math.sin(t*0.2+i);
      cx.strokeStyle=b.phase===3?P.YEL:P.RED;cx.lineWidth=1.5;
      cx.beginPath();
      cx.arc(x,y,r,a1,a2);
      cx.stroke();
      cx.globalAlpha=1;
    }
  }

  // === ЧАСТИЦЫ ЯРОСТИ — постоянная аура (новое) ===
  if(t%2===0&&b.phase>=2){
    const pa=Math.random()*Math.PI*2;
    const pr=TINA_R+Math.random()*30;
    PTS.push({
      x:x+Math.cos(pa)*pr,y:y+Math.sin(pa)*pr,
      vx:Math.cos(pa)*0.5,vy:Math.sin(pa)*0.5,
      lf:20,ml:24,col:b.phase===3?P.YEL:'#ff8844',
      sz:1,gv:0,fade:0.6,
    });
  }

  // Эффект мигания при попадании в неуязвимую часть
  if(b.reflectFlash>0){
    cx.globalAlpha=b.reflectFlash/15;
    ring(x,y,TINA_R,P.WHT,2);
    ring(x,y,TINA_R+2,P.WHT,1);
    cx.globalAlpha=1;
  }
  // Слабые места в фазе 3 — теперь это БРЕШИ В ЩИТЕ
  if(b.phase===3 && b.weakSpots){
    drwShieldWithBreaches(b,t);
  }
  // Энергоблоки в фазе 1
  if(b.phase===1 && b.energyBlocks){
    for(const eb of b.energyBlocks) drwEnergyBlock(eb,t);
  }
  // Турели в фазе 2
  if(b.phase===2 && b.turrets){
    for(const tr of b.turrets) drwTurret(tr,t);
  }

  // === ★ v16 r3 #9: ЭКСТРЕННЫЙ ПРОТОКОЛ — броня + пушки ===
  if(eP){
    drwEmergencyProtocol(b,t);
  }

  // ★ v16 r4 #4: HP бар и метки фазы Тины БОЛЬШЕ НЕ рисуются над ней (выходили за экран и были размытыми).
  // Они теперь отображаются исключительно в screen-space HUD (см. drwFinaleTina ниже).
}

// ★ v16 r3 #9: Экстренный протокол — броня обхватывает Тину, появляются пушки, заряжаются → кот!
// ★ v16 r10: 1740 кадров (29 сек). Пушки 2× медленнее, 2× больше, добавлена 5я центральная пушка
// и видимая трансформация Тины (трещины ширятся, цвет становится злее, корпус "вспучивается").
// Тайминг по фазам:
//   0–60     (1 сек):  Тина: «ХВАТИТ ИГР! ПЕРЕХОЖУ В ЭКСТРА РЕЖИМ!»
//   60–540   (8 сек):  5 ОГРОМНЫХ пушек появляются и наводятся на игрока
//  540–1020  (8 сек):  заряжание — энерго-шары + обратный отсчёт 5..4..3..2..1
// 1020–1200  (3 сек):  «недоумение» — пушки теряют заряд
// 1200–1380  (3 сек):  кот перегрызает провода
// 1380–1560  (3 сек):  массовые взрывы
// 1560–1740  (3 сек):  финальная вспышка → tinaDie
function drwEmergencyProtocol(b,t){
  const x=b.x|0,y=b.y|0;
  const eP=b.emergencyProtocol;
  const eT=eP.t;
  const p=window.G&&window.G.pl;

  // === АУРА ЯРОСТИ ===
  if(eT<1560){
    const rage=Math.min(1,eT/60);
    cx.globalAlpha=rage*(0.4+0.2*Math.sin(t*0.3));
    ring(x,y,TINA_R+8,P.RED,3);
    ring(x,y,TINA_R+14,P.RED,2);
    cx.globalAlpha=rage*(0.2+0.15*Math.sin(t*0.4+1));
    ring(x,y,TINA_R+22,P.RED,1);
    cx.globalAlpha=1;
  }

  // === ★ v16 r10 #4: ТРАНСФОРМАЦИЯ ТИНЫ — нарастает с прогрессом катсцены ===
  // Тина становится "злее": красное свечение тела, расширяющиеся трещины, дрожь
  if(eT>=60&&eT<1380){
    const morphT=Math.min(1,(eT-60)/300); // полностью сформирована к концу появления пушек
    // 1) Красное свечение тела (поверх обычной отрисовки Тины)
    cx.globalAlpha=morphT*(0.35+0.15*Math.sin(t*0.18));
    disc(x,y,TINA_R-2,'#aa1100');
    cx.globalAlpha=morphT*0.20;
    disc(x,y,TINA_R-12,'#ff3322');
    cx.globalAlpha=1;
    // 2) Расширяющиеся жёлто-белые трещины — "звезда внутри прорывается"
    const cracks=8+Math.floor(morphT*8); // 8..16 трещин
    for(let i=0;i<cracks;i++){
      const ang=i/cracks*Math.PI*2+t*0.003;
      const cLen=TINA_R*(0.5+morphT*0.55);
      const cWidth=1+morphT*2;
      cx.globalAlpha=morphT*(0.55+0.3*Math.sin(t*0.15+i*1.7));
      cx.strokeStyle=Math.random()<0.5?'#ffee44':'#ff6622';
      cx.lineWidth=cWidth;
      // Зигзаговая трещина
      cx.beginPath();
      let lx=x,ly=y;
      const segs=4;
      for(let s=1;s<=segs;s++){
        const tt=s/segs;
        const wob=(Math.random()-0.5)*morphT*8;
        const tx=x+Math.cos(ang+wob*0.02)*cLen*tt;
        const ty=y+Math.sin(ang+wob*0.02)*cLen*tt;
        if(s===1){cx.moveTo(lx,ly);}
        cx.lineTo(tx,ty);
        lx=tx;ly=ty;
      }
      cx.stroke();
      cx.lineWidth=1;
    }
    cx.globalAlpha=1;
    // 3) "Вспучивание" — пузыри-шишки на корпусе (выпуклости)
    const bumps=Math.floor(morphT*6);
    for(let i=0;i<bumps;i++){
      const ba=t*0.005+i*1.05;
      const br=TINA_R+Math.sin(t*0.08+i)*4;
      const bx_=x+Math.cos(ba)*br;
      const by_=y+Math.sin(ba)*br;
      cx.globalAlpha=0.7*morphT;
      disc(bx_|0,by_|0,(4+Math.sin(t*0.1+i)*2)|0,'#ff4422');
      cx.globalAlpha=0.9*morphT;
      disc(bx_|0,by_|0,2,'#ffaa44');
      cx.globalAlpha=1;
    }
    // 4) Микро-частицы пара/осколков — слабые и постоянные
    if(t%4===0){
      const pa=Math.random()*Math.PI*2;
      const pr=TINA_R+Math.random()*8;
      PTS.push({
        x:x+Math.cos(pa)*pr,y:y+Math.sin(pa)*pr,
        vx:Math.cos(pa)*0.5,vy:Math.sin(pa)*0.5-0.3,
        lf:24,ml:28,col:Math.random()<0.5?'#aa3322':'#664422',sz:1,gv:-0.01,fade:0.4
      });
    }
    // 5) Дрожание тела (постоянная микро-тряска) — лёгкое смещение для всего рендера
    if(eT%14===0)shake(1+morphT*1.5);
  }

  // === ФАЗА 0 (0-60): «ХВАТИТ ИГР!» ===
  if(eT<60){
    const breath=eT/60;
    cx.globalAlpha=breath*0.35;
    disc(x,y,TINA_R+10,'#ff2200');
    cx.globalAlpha=1;
  }

  // === ФАЗА 1 (60-540): ПОЯВЛЕНИЕ 5 ОГРОМНЫХ ПУШЕК (8 сек, 2× больше) ===
  // ★ v16 r11: 5 пушек распределены ШИРЕ по периметру Тины (полный круг ±π радиан)
  // и появляются ПО ОЧЕРЕДИ — внешние первыми, центральная последней.
  // Главная пушка чуть короче (×0.8): 260→208.
  let gunPositions=null;
  if(eT>=60){
    let angleToPlayer=Math.PI;
    if(p){angleToPlayer=Math.atan2(p.y-y,p.x-x);}
    // Распределение по дуге ±π (180° сектор обращённый к игроку, расстановка ровная)
    // Оффсеты от наружных к центру: [-1.4, +1.4, -0.7, +0.7, 0]
    // (порядок появления — от широких к центру)
    const sequence=[
      {off:-1.4, slot:0},  // самая дальняя левая
      {off: 1.4, slot:1},  // самая дальняя правая
      {off:-0.7, slot:2},  // ближняя левая
      {off: 0.7, slot:3},  // ближняя правая
      {off: 0.0, slot:4},  // центральная (главная)
    ];
    // Длительность фазы появления = 480 кадров
    // Каждая пушка получает окно 80 кадров: появление + промежуток
    // Pos i стартует в eT = 60 + i*80, длится 160 кадров на полное выдвижение
    // Последняя стартует на eT = 60+4*80 = 380, заканчивается ~540
    gunPositions=[];
    for(const item of sequence){
      const isCenter=(item.off===0);
      const startT=60+item.slot*80;
      const localT=eT-startT;
      if(localT<-2)continue; // ещё не должна появляться
      const gunT=Math.max(0,Math.min(1,localT/160));
      const eased=easeOutCube(gunT);
      const angle=angleToPlayer+item.off;
      const baseR=isCenter?TINA_R-4:TINA_R+10;
      // ★ r11: Главная пушка короче ×0.8 (208 вместо 260)
      // ★ r12 #1: Пушки в 1.5× меньше (главная 208→138, обычные 160→107)
      const maxProtrude=isCenter?138:107;
      let protrude=8+(maxProtrude-8)*eased;
      // ★ v16 r12 #2: ВОЗВРАТ ПУШЕК ВНУТРЬ во время confusion-фазы (eT 1140..1380)
      // Дать 120 кадров сжатия энерго-шаров, потом 240 кадров ретракции
      if(eT>=1140&&eT<1380){
        const retractT=Math.min(1,(eT-1140)/240); // 0..1 за 4 сек
        const retractEased=easeOutCube(retractT);
        // Протруд интерполируется обратно к нулю (-12 чтобы пушка совсем спряталась внутрь корпуса)
        protrude=protrude*(1-retractEased)+(-12)*retractEased;
      }else if(eT>=1380){
        protrude=-12; // полностью внутри Тины
      }
      const baseX=x+Math.cos(angle)*baseR;
      const baseY=y+Math.sin(angle)*baseR;
      const aimAngle=p?Math.atan2(p.y-baseY,p.x-baseX):angle;
      const muzzleX=baseX+Math.cos(aimAngle)*protrude;
      const muzzleY=baseY+Math.sin(aimAngle)*protrude;
      gunPositions.push({baseX,baseY,muzzleX,muzzleY,aimAngle,protrude,isCenter,localT,gunT});

      // ★ v16 r12 #2: Если пушка задвинута внутрь Тины — не рисуем (но позиция запомнена для charging)
      if(protrude<-8){
        continue;
      }

      // Звук появления (один раз при старте)
      if(localT===0){
        bip(50,.4,.3,'sawtooth',isCenter?60:120,isCenter?30:55);
        // Дымовой пыхт. при появлении
        for(let s=0;s<14;s++){
          PTS.push({
            x:baseX+(Math.random()-0.5)*30,
            y:baseY+(Math.random()-0.5)*30,
            vx:(Math.random()-0.5)*1.6,vy:(Math.random()-0.5)*1.6-0.3,
            lf:24,ml:30,col:Math.random()<0.5?'#664422':'#aa6633',sz:1+Math.random(),gv:0,fade:0.45
          });
        }
        if(isCenter){shake(8);flash(.25,P.RED);}
        else shake(3);
      }

      // === ОТРИСОВКА ПУШКИ ===
      cx.save();
      cx.translate(baseX,baseY);
      cx.rotate(aimAngle);
      if(isCenter){
        // ★ r12 #1+#5: ЦЕНТРАЛЬНАЯ супер-пушка — детализированная, технологичная (×0.66 от прежней)
        // База — шестигранная многослойная платформа
        cx.fillStyle='#000000';
        cx.fillRect(-22,-22,44,44);
        cx.fillStyle='#1a0606';
        cx.fillRect(-20,-20,40,40);
        cx.fillStyle='#3a1208';
        cx.fillRect(-18,-18,36,36);
        cx.fillStyle='#552211';
        cx.fillRect(-16,-16,32,32);
        cx.fillStyle='#772211';
        cx.fillRect(-14,-14,28,28);
        // Тёмный шестиугольный сердечник
        cx.fillStyle='#220606';
        cx.fillRect(-10,-10,20,20);
        // Пульсирующий энергоядро в центре
        const corePulse=0.6+0.4*Math.sin(eT*0.18);
        cx.globalAlpha=corePulse;
        cx.fillStyle='#ff4422';cx.fillRect(-6,-6,12,12);
        cx.fillStyle='#ffaa44';cx.fillRect(-4,-4,8,8);
        cx.fillStyle='#ffee88';cx.fillRect(-2,-2,4,4);
        cx.globalAlpha=1;
        // Радиаторы-рёбра по бокам базы
        cx.fillStyle='#aa6633';
        for(let f=-14;f<=12;f+=4){
          cx.fillRect(-22,f,2,3);cx.fillRect(20,f,2,3);
        }
        // Декоративные клёпки по углам
        cx.fillStyle='#cc6633';
        cx.fillRect(-20,-20,2,2);cx.fillRect(18,-20,2,2);
        cx.fillRect(-20,18,2,2);cx.fillRect(18,18,2,2);
        // Ствол — двойной контур + энергожила
        cx.fillStyle='#000000';
        cx.fillRect(0,-10,protrude+6,20);
        cx.fillStyle='#220606';
        cx.fillRect(2,-8,protrude+2,16);
        cx.fillStyle='#3a1208';
        cx.fillRect(4,-6,protrude-2,12);
        cx.fillStyle='#552211';
        cx.fillRect(6,-4,protrude-6,8);
        // Энергоканал внутри ствола (пульсирующая полоса)
        cx.globalAlpha=0.8+0.2*Math.sin(eT*0.25);
        cx.fillStyle='#ff4422';
        cx.fillRect(8,-2,protrude-10,4);
        cx.fillStyle='#ffaa66';
        cx.fillRect(8,-1,protrude-10,2);
        cx.globalAlpha=1;
        // Кольца усиления (более тонкие чем раньше)
        cx.fillStyle='#664422';
        const cRings=Math.floor(protrude/14);
        for(let r=1;r<=cRings;r++){
          cx.fillRect(r*14,-10,2,20);
          // Световой блик на кольце
          cx.fillStyle='#cc8855';
          cx.fillRect(r*14,-10,2,2);
          cx.fillStyle='#664422';
        }
        // Срез ствола — энергомаска (линза)
        cx.fillStyle='#000000';
        cx.fillRect(protrude,-7,4,14);
        cx.globalAlpha=0.7+0.3*Math.sin(eT*0.3);
        cx.fillStyle='#ff2200';
        cx.fillRect(protrude+1,-5,2,10);
        cx.fillStyle='#ffaa44';
        cx.fillRect(protrude+1,-3,2,6);
        cx.globalAlpha=1;
      }else{
        // ★ r12 #1+#5: Угловые пушки — компактные но детализированные (×0.66 от прежних)
        cx.fillStyle='#000000';
        cx.fillRect(-15,-17,30,34);
        cx.fillStyle='#1a0606';
        cx.fillRect(-13,-15,26,30);
        cx.fillStyle='#3a1208';
        cx.fillRect(-12,-14,24,28);
        cx.fillStyle='#552211';
        cx.fillRect(-10,-12,20,24);
        cx.fillStyle='#772211';
        cx.fillRect(-8,-10,16,20);
        // Энергоядро базы
        const corePulse2=0.5+0.4*Math.sin(eT*0.2+item.slot);
        cx.globalAlpha=corePulse2;
        cx.fillStyle='#ff4422';cx.fillRect(-4,-4,8,8);
        cx.fillStyle='#ffaa44';cx.fillRect(-2,-2,4,4);
        cx.globalAlpha=1;
        // Радиаторы
        cx.fillStyle='#aa6633';
        for(let f=-10;f<=8;f+=4){
          cx.fillRect(-15,f,2,2);cx.fillRect(13,f,2,2);
        }
        // Клёпки по углам
        cx.fillStyle='#cc6633';
        cx.fillRect(-13,-15,2,2);cx.fillRect(11,-15,2,2);
        cx.fillRect(-13,13,2,2);cx.fillRect(11,13,2,2);
        // Ствол
        cx.fillStyle='#000000';
        cx.fillRect(0,-8,protrude+4,16);
        cx.fillStyle='#220606';
        cx.fillRect(2,-6,protrude,12);
        cx.fillStyle='#3a1208';
        cx.fillRect(4,-5,protrude-4,10);
        cx.fillStyle='#552211';
        cx.fillRect(6,-3,protrude-8,6);
        // Энергожила
        cx.globalAlpha=0.7+0.3*Math.sin(eT*0.25+item.slot);
        cx.fillStyle='#ff4422';
        cx.fillRect(8,-1,protrude-12,2);
        cx.fillStyle='#ffaa66';
        cx.fillRect(8,-1,protrude-12,1);
        cx.globalAlpha=1;
        // Кольца усиления
        cx.fillStyle='#552211';
        const rings=Math.floor(protrude/12);
        for(let r=1;r<=rings;r++){
          cx.fillRect(r*12,-8,2,16);
          cx.fillStyle='#aa7744';
          cx.fillRect(r*12,-8,2,1);
          cx.fillStyle='#552211';
        }
        // Срез — линза
        cx.fillStyle='#000000';
        cx.fillRect(protrude,-5,3,10);
        cx.globalAlpha=0.6+0.3*Math.sin(eT*0.3+item.slot);
        cx.fillStyle='#ff2200';
        cx.fillRect(protrude+1,-3,1,6);
        cx.fillStyle='#ffaa44';
        cx.fillRect(protrude+1,-2,1,4);
        cx.globalAlpha=1;
      }
      cx.restore();

      // Подсветка дула во время появления
      if(gunT<1){
        cx.globalAlpha=0.4*Math.sin(eT*0.3+item.slot);
        disc(muzzleX|0,muzzleY|0,isCenter?6:4,P.RED);
        cx.globalAlpha=1;
      }
      // Лазерный прицел на игрока
      if(p&&gunT>0.5&&Math.floor(eT/3)%2===0){
        cx.globalAlpha=isCenter?(0.5+0.3*Math.sin(eT*0.4)):(0.3+0.2*Math.sin(eT*0.4));
        cx.strokeStyle=P.RED;cx.lineWidth=isCenter?2:1;
        cx.beginPath();
        cx.moveTo(muzzleX|0,muzzleY|0);
        cx.lineTo(p.x|0,p.y|0);
        cx.stroke();
        cx.lineWidth=1;
        cx.globalAlpha=1;
      }
    }
    // Звуки появления (старые — теперь дублируем при первом появлении каждой пушки выше; оставим тут общий "пробуждение")
    // Частицы при выдвижении
    if(eT<540&&t%2===0){
      for(const g of gunPositions){
        if(Math.random()<0.5){
          PTS.push({
            x:g.baseX+(Math.random()-0.5)*20,

  if(eT>=1560&&eT<1740){

    if(sT>40){

        const a=i/longN*Math.PI*2+rot;

        cx.globalAlpha=baseA*0.82;cx.strokeStyle='#ffffff';cx.lineWidth=1;
        cx.beginPath();cx.moveTo(x,y);cx.lineTo((x+Math.cos(a)*len)|0,(y+Math.sin(a)*len)|0);cx.stroke();

        if(starGrow>0.25){
          cx.globalAlpha=baseA*pulse*0.65;

    if(sT>120){

        cx.globalAlpha=Math.min(0.7,(sT-120)/100);

// ======= ВОСКЛИЦАТЕЛЬНЫЙ ЗНАК (квест-индикатор) =======
// Большой, выразительный, со свечением и пульсацией.
// x,y — позиция вершины восклицательного знака (макушка)
// t — глобальный таймер для анимации
// col — основной цвет (по умолчанию жёлтый)
function drwExclaim(x,y,t,col){
  col=col||P.YEL;
  // Pulse-эффект (масштаб + alpha)
  const pulse=0.85+0.15*Math.sin(t*0.18);
  const bob=Math.sin(t*0.10)*1.5;
  // Свечение-ореол вокруг (мягкое)
  cx.globalAlpha=0.18*pulse;
  disc((x)|0,(y+5+bob)|0,7,col);
  cx.globalAlpha=0.30*pulse;
  disc((x)|0,(y+5+bob)|0,5,col);
  cx.globalAlpha=1;
  // Тень/контур (1px смещение вниз-вправо)
  cx.fillStyle='#000';
  cx.fillRect((x-1)|0,(y+1+bob)|0,4,8);   // палочка-тень
  cx.fillRect((x-1)|0,(y+10+bob)|0,4,3);   // точка-тень
  // Сам знак — крупный (3px ширина, 7px палочка + точка)
  cx.fillStyle=col;
  cx.fillRect((x-1)|0,(y+bob)|0,3,7);     // палочка
  cx.fillRect((x-1)|0,(y+9+bob)|0,3,3);    // точка
  // Блик (1px белая точка слева)
  cx.fillStyle='#fff';
  cx.fillRect((x-1)|0,(y+bob)|0,1,2);
  cx.globalAlpha=1;
}

// Возвращает массив активных квестов с заголовком и прогрессом.
function getActiveQuests(G){
  const out=[];
  // Дрош — маяки или удержание
  if(G.droshSide&&G.droshSide.questAccepted&&!G.droshSide.done){
    if(G.droshSide.holdActive){
      const pct=Math.floor(G.droshSide.holdT/G.droshSide.holdDur*100);
      out.push({title:'УДЕРЖИ ОГОНЬ',progress:pct+'%',col:P.YEL});
    }else{
      const f=G.droshSide.beacons.filter(b=>b.fixed).length;
      const total=G.droshSide.beacons.length;
      out.push({title:'ЗАЖГИ МАЯКИ',progress:f+'/'+total,col:f<total?P.CYA:P.YEL});
    }
  }
  // Бубблика — доставка спор
  if(G.bub&&G.bub.delivery&&G.bub.delivery.active&&!G.campaignState.flags.bubDeliveryDone){
    const D=G.bub.delivery;
    if(D.carrying){
      const ts=Math.ceil(D.timer/60);
      const dest=G.bub.islands[D.to]?G.bub.islands[D.to].name:'?';
      out.push({title:'ДОСТАВКА СПОР',progress:'НА '+dest+' '+ts+'С',col:ts<5?P.RED:P.YEL});
    }else if(D.completed<D.target){
      out.push({title:'ДОСТАВКА СПОР',progress:D.completed+'/'+D.target+' К ПФФФТУ',col:P.CYA});
    }else{
      out.push({title:'ДОСТАВКА СПОР',progress:'ВЕРНИСЬ К ПФФФТУ',col:P.GRN});
    }
  }
  // Краснозём — снаряды и хищники
  if(G.krz&&G.krz.questActive&&!G.krasDone){
    const KZ=G.krz;
    const total=KZ.shells.length;
    if(KZ.carryIdx>=0){
      out.push({title:'ЗАРЯДИ ТУРЕЛЬ',progress:'НЕСИ К ТУРЕЛИ ('+KZ.delivered+'/'+total+')',col:P.YEL});
    }else if(KZ.delivered<total){
      out.push({title:'СНАРЯДЫ',progress:'СОБЕРИ '+KZ.delivered+'/'+total,col:P.CYA});
    }else{
      const alive=KZ.scavengers.filter(s=>s.alive).length;
      out.push({title:'ХИЩНИКИ',progress:'ОСТАЛОСЬ: '+alive,col:alive>0?P.RED:P.GRN});
    }
  }
  return out;
}

// ======= БРИФИНГ ПРИШЕЛЬЦА — отдельная функция =======
// Состояние: G.briefing = {t:N, planet:'drosh|...'}
// Активирует увеличение t каждый кадр, рендерит окно "входящий вызов",
// автоматически скрывается через ~4 секунды после окончания печати.
function drwAlienBriefing(G){
  if(!G.briefing)return;
  const B=G.briefing;
  B.t++;
  const briefing=getAlienBriefing(B.planet);
  if(!briefing){G.briefing=null;return;}
  const t=B.t;
  // Тайминги: задержка появления → fade-in → печать → задержка → fade-out
  const isTinaBriefing=B.planet&&B.planet.startsWith('tina_phase');
  const SHOW_DELAY=40;
  const FADE_IN=30;
  const TYPE_RATE=isTinaBriefing?0.9:1.4;
  const STAY_AFTER_TYPE=isTinaBriefing?100:240;
  const FADE_OUT=30;
  const charsTotal=briefing.length;
  const typingStartT=SHOW_DELAY;
  const typingEndT=typingStartT+charsTotal*TYPE_RATE;
  const fadeOutStartT=typingEndT+STAY_AFTER_TYPE;
  const fadeOutEndT=fadeOutStartT+FADE_OUT;
  if(t<SHOW_DELAY)return;
  if(t>fadeOutEndT){G.briefing=null;return;}
  // Альфа канал
  let alienA;
  if(t<SHOW_DELAY+FADE_IN) alienA=(t-SHOW_DELAY)/FADE_IN;
  else if(t<fadeOutStartT) alienA=1;
  else alienA=1-(t-fadeOutStartT)/FADE_OUT;
  alienA=Math.max(0,Math.min(1,alienA));
  cx.globalAlpha=alienA;
  // Окно сигнала внизу экрана (рация-портрет слева + текст справа)
  const boxX=4, boxY=LH-58, boxW=LW-8, boxH=52;
  bx2(boxX,boxY,boxW,boxH,'#020a14','#3388cc',1);
  const beepBlink=Math.sin(t*0.18)*0.5+0.5;
  cx.globalAlpha=alienA*(0.5+beepBlink*0.5);
  rc(boxX+1,boxY+1,boxW-2,1,'#5599cc');
  cx.globalAlpha=alienA;
  // === ЛЕВЫЙ БЛОК: ПОРТРЕТ ПРИШЕЛЬЦА ===
  const portX=boxX+5, portY=boxY+5, portW=22, portH=42;
  bx2(portX,portY,portW,portH,'#001122','#1a4470',1);
  for(let sl=0;sl<portH-2;sl++){
    if(sl%2===0){
      cx.globalAlpha=alienA*0.4;
      cx.fillStyle='#0a2030';
      cx.fillRect(portX+1,portY+1+sl,portW-2,1);
      cx.globalAlpha=alienA;
    }
  }
  const apx=portX+portW/2|0;
  const apy=portY+portH/2+6|0;
  rc(apx-3,apy-3,7,7,'#7744aa');
  rc(apx-2,apy-3,5,1,'#aa66cc');
  rc(apx-3,apy+3,7,1,'#552288');
  cx.globalAlpha=alienA*0.85;
  disc(apx,apy-8,5,'#aaeeff');
  cx.globalAlpha=alienA;
  ring(apx,apy-8,5,'#88ccee',1);
  const eyeBlink=Math.floor(t/55)%5===0;
  cx.fillStyle='#000';
  if(!eyeBlink){
    cx.fillRect(apx-2,apy-10,2,2);
    cx.fillRect(apx+1,apy-10,2,2);
    cx.fillStyle='#ffffff';
    cx.fillRect(apx-2,apy-10,1,1);
    cx.fillRect(apx+1,apy-10,1,1);
  }else{
    cx.fillRect(apx-2,apy-9,2,1);
    cx.fillRect(apx+1,apy-9,2,1);
  }
  // Рот двигается во время печати, замирает после
  if(t<typingEndT&&t%6<3){
    cx.fillStyle='#552288';
    cx.fillRect(apx-1,apy-6,2,1);
  }
  rc(apx-2,apy-14,1,2,'#aaeeff');
  rc(apx+2,apy-14,1,2,'#aaeeff');
  if(t%14<7){
    cx.fillStyle='#ff44aa';
    cx.fillRect(apx-2,apy-15,1,1);
    cx.fillRect(apx+2,apy-15,1,1);
  }
  txs('СИГНАЛ',portX+1,portY+portH-7,'#5599cc',P.BLK,1);
  // === ПРАВЫЙ БЛОК: ТЕКСТ БРИФИНГА ===
  const txtX=portX+portW+6, txtY=boxY+4;
  const txtW=boxW-portW-12;
  txs('ВХОДЯЩИЙ ВЫЗОВ',txtX,txtY,'#5599cc',P.BLK,1);
  for(let bb=0;bb<3;bb++){
    const blAlpha=Math.sin(t*0.15+bb*1.5)*0.5+0.5;
    cx.globalAlpha=alienA*blAlpha;
    cx.fillStyle='#5599cc';
    cx.fillRect(txtX+gw('ВХОДЯЩИЙ ВЫЗОВ')+3+bb*2,txtY+1,1,3);
    cx.globalAlpha=alienA;
  }
  rc(txtX,txtY+8,txtW,1,'#1a4470');
  // Текст брифинга — печатается посимвольно, ускоренный темп
  const charsRevealed=Math.max(0,Math.min(charsTotal,Math.floor((t-typingStartT)/TYPE_RATE)));
  const visibleText=briefing.slice(0,charsRevealed);
  const allLines=[];
  const words=visibleText.split(' ');
  let curLine='';
  for(const w of words){
    const trial=curLine?curLine+' '+w:w;
    if(gw(trial)<=txtW)curLine=trial;
    else{if(curLine)allLines.push(curLine);curLine=w;if(allLines.length>=3)break;}
  }
  if(curLine&&allLines.length<4)allLines.push(curLine);
  for(let i=0;i<Math.min(4,allLines.length);i++){
    txs(allLines[i],txtX,txtY+11+i*8,'#cce8ff',P.BLK,1);
  }
  // Курсор печати
  if(charsRevealed<charsTotal&&Math.floor(t/8)%2){
    const lastLine=allLines[allLines.length-1]||'';
    const ly=txtY+11+(allLines.length-1)*8;
    txs('_',txtX+gw(lastLine),ly,'#5599cc',P.BLK,1);
  }
  cx.globalAlpha=1;
}

// ======= ТУТОРИАЛ =======
// Простая система подсказок: показывает стрелки и текст указывающие на элементы UI/механики.
// Игрок может закрыть тап/Enter/Esc или пройти по шагам.
// G.tutorial = {steps:[{x,y,text,arrow:'left|right|up|down'}], step:0, t:0}

function startTutorial(G,steps){
  G.tutorial={steps,step:0,t:0,visible:true};
  // Не трогаем TAP_FIRE — тач-стрельба в правой части экрана блокируется тем,
  // что upd-функции возвращают рано при G.tutorial. Если же отключить TAP_FIRE,
  // он останется false после закрытия туториала — и игрок не сможет стрелять.
}

function updTutorial(G){
  if(!G.tutorial||!G.tutorial.visible)return false;
  G.tutorial.t++;
  // Закрытие: продвинуться к следующему шагу или закрыть
  if(G.tutorial.t>20&&(KD.Enter||KD.Space||mC||KD.Escape||btnJust('int'))){
    KD.Enter=false;KD.Space=false;mC=false;
    sfxUI();
    if(G.tutorial.step<G.tutorial.steps.length-1){
      G.tutorial.step++;G.tutorial.t=0;
    }else{
      G.tutorial.visible=false;
      G.tutorial=null;
    }
    return true;  // ввод обработан
  }
  return true; // блокирует игровой ввод пока туториал активен
}

function drwTutorial(G){
  if(!G.tutorial||!G.tutorial.visible)return;
  const T=G.tutorial;
  const cur=T.steps[T.step];
  if(!cur)return;
  // Полупрозрачное затемнение
  cx.globalAlpha=0.45;
  rc(0,0,LW,LH,P.BLK);
  cx.globalAlpha=1;

  // Подсветка области:
  //  - если задан hrect — рисуем прямоугольник (для протяжённых UI типа HUD)
  //  - иначе если hx/hy — пульсирующий круг
  if(cur.hrect){
    const hr=cur.hrect;
    cx.globalAlpha=0.4+0.25*Math.sin(T.t*0.15);
    // Контур пунктирной рамки
    cx.strokeStyle=P.YEL;cx.lineWidth=1;
    cx.strokeRect(hr.x-1,hr.y-1,hr.w+2,hr.h+2);
    cx.strokeRect(hr.x-3,hr.y-3,hr.w+6,hr.h+6);
    // Уголки усиленные
    const cn=3;
    cx.fillStyle=P.YEL;
    // Верхние углы
    cx.fillRect(hr.x-3,hr.y-3,cn,1);cx.fillRect(hr.x-3,hr.y-3,1,cn);
    cx.fillRect(hr.x+hr.w+3-cn,hr.y-3,cn,1);cx.fillRect(hr.x+hr.w+2,hr.y-3,1,cn);
    // Нижние углы
    cx.fillRect(hr.x-3,hr.y+hr.h+2,cn,1);cx.fillRect(hr.x-3,hr.y+hr.h+3-cn,1,cn);
    cx.fillRect(hr.x+hr.w+3-cn,hr.y+hr.h+2,cn,1);cx.fillRect(hr.x+hr.w+2,hr.y+hr.h+3-cn,1,cn);
    cx.globalAlpha=1;
  }else if(cur.hx!=null&&cur.hy!=null&&!cur.noRing){
    const r=cur.hr||14;
    cx.globalAlpha=0.3+0.2*Math.sin(T.t*0.15);
    ring(cur.hx,cur.hy,r,P.YEL,1);
    ring(cur.hx,cur.hy,r+3,P.YEL,1);
    cx.globalAlpha=1;
  }

  // Стрелка к указываемому элементу
  if(cur.hx!=null&&cur.hy!=null&&cur.arrow){
    const off=Math.sin(T.t*0.12)*2;
    cx.fillStyle=P.YEL;
    if(cur.arrow==='left'){
      // указывает влево (от подсказки)
      const ax=cur.hx+10+off,ay=cur.hy;
      cx.fillRect(ax,ay-1,4,2);
      cx.fillRect(ax,ay-2,2,1);cx.fillRect(ax,ay+1,2,1);
      cx.fillRect(ax+1,ay-3,1,1);cx.fillRect(ax+1,ay+2,1,1);
    }else if(cur.arrow==='right'){
      const ax=cur.hx-14-off,ay=cur.hy;
      cx.fillRect(ax,ay-1,4,2);
      cx.fillRect(ax+2,ay-2,2,1);cx.fillRect(ax+2,ay+1,2,1);
      cx.fillRect(ax+3,ay-3,1,1);cx.fillRect(ax+3,ay+2,1,1);
    }else if(cur.arrow==='up'){
      const ax=cur.hx,ay=cur.hy+10+off;
      cx.fillRect(ax-1,ay,2,4);
      cx.fillRect(ax-2,ay,1,2);cx.fillRect(ax+1,ay,1,2);
      cx.fillRect(ax-3,ay+1,1,1);cx.fillRect(ax+2,ay+1,1,1);
    }else if(cur.arrow==='down'){
      const ax=cur.hx,ay=cur.hy-14-off;
      cx.fillRect(ax-1,ay,2,4);
      cx.fillRect(ax-2,ay+2,1,2);cx.fillRect(ax+1,ay+2,1,2);
      cx.fillRect(ax-3,ay+1,1,1);cx.fillRect(ax+2,ay+1,1,1);
    }
  }

  // Облако с текстом
  const lines=Array.isArray(cur.text)?cur.text:[cur.text];
  let maxW=0;for(const l of lines)maxW=Math.max(maxW,gw(l));
  const boxW=maxW+10,boxH=lines.length*8+8;
  let bx=cur.tx!=null?cur.tx:(LW-boxW)/2;
  let by=cur.ty!=null?cur.ty:LH-boxH-26;
  bx=Math.max(2,Math.min(LW-boxW-2,bx));
  by=Math.max(20,Math.min(LH-boxH-2,by));
  bx=bx|0;by=by|0;

  // Появление с лёгким fade-in
  const fade=Math.min(1,T.t/15);
  cx.globalAlpha=fade;
  bx2(bx,by,boxW,boxH,'#001833',P.YEL,1);
  rc(bx+1,by+1,boxW-2,1,'#33aacc');  // верхняя планка
  for(let i=0;i<lines.length;i++){
    txs(lines[i],bx+5,by+4+i*8,P.WHT,P.BLK,1);
  }
  cx.globalAlpha=1;

  // Подсказка в углу — "тап продолжить"
  if(T.t>30&&Math.floor(T.t/22)%2){
    const m=USE_TOUCH_UI?'ТАП':'ENTER';
    const isLast=T.step>=T.steps.length-1;
    const action=isLast?'ЗАКРЫТЬ':'ДАЛЬШЕ';
    txcs(m+' - '+action,LH-5,P.UIT3,P.BLK,1);
  }

  // Прогресс шагов (точки внизу слева)
  for(let i=0;i<T.steps.length;i++){
    const dx=4+i*5,dy=LH-5;
    rc(dx,dy,3,3,i===T.step?P.YEL:'#333344');
  }
}

    case 0: G.paused=false; sfxUI2(); break;

    case 2: MUSIC_ON=!MUSIC_ON; if(_mAudio)_mAudio.volume=MUSIC_ON?musicVol:0; sfxUI(); break;
    case 3: cycleMusicTrack(G); break;
    case 4: toggleFullscreen(); sfxUI(); break;
    case 5:
      G.paused=false;
      sfxUI2();
      startTrans(()=>{
        const fresh=newGame();
        for(const k in G){if(G.hasOwnProperty(k))delete G[k];}
        Object.assign(G,fresh);
        window.G=G;
        resetBtns();
        initTitle(G);
      });
      break;
  }
}
function handlePauseInput(G){
  // Переключение паузы (но не во время переходов или диалогов)
  const canToggle=!G.transIn && !G.transOut && !G.dlg;
  if(canToggle){
    if(KD.Escape || KD.KeyP || pauseIconClicked()){
      G.paused=!G.paused;
      G.pauseSel=0;
      sfxUI();
      mC=false; // чтобы клик по иконке не проваливался дальше
      return;
    }
  }
  if(G.paused){
    // Навигация
    if(KD.ArrowUp||KD.KeyW){G.pauseSel=(G.pauseSel+5)%6;sfxUI();}
    if(KD.ArrowDown||KD.KeyS){G.pauseSel=(G.pauseSel+1)%6;sfxUI();}
    if(KD.Enter||KD.Space){executePauseOption(G,G.pauseSel);}
    // Клик по опциям
    if(mC && G._pauseHits){
      for(const h of G._pauseHits){
        if(mX>=h.x&&mX<=h.x+h.w&&mY>=h.y&&mY<=h.y+h.h){
          G.pauseSel=h.idx;
          executePauseOption(G,h.idx);
          mC=false;
          break;
        }
      }
    }
  }
}

function spwnAst(G){const sizes=[4,6,9],s=sizes[(Math.random()*3)|0];const y=s+4+Math.random()*(LH-s*2-24);const sp=.6+Math.random()*1.4+(1-G.prog)*.4;const cracks=[];for(let i=0;i<3+((Math.random()*4)|0);i++)cracks.push([Math.floor(Math.random()*s*2-s),Math.floor(Math.random()*s*2-s)]);G.asts.push({x:LW+s+4,y,s,sp,hp:s,maxHp:s,cracks,drop:Math.random()<.5,rot:0,flash:0});}

function updSpace(G){
  handlePauseInput(G);if(G.paused)return;
  // Туториал блокирует игровой ввод
  if(G.tutorial){updTutorial(G);return;}
  const p=G.pl;
  G.sT++;
  const sh=G.ship;
  // Топливо теперь отвечает за маршевый ход и ускорение. При нуле остаётся аварийная тяга.
  sh.fuel=Math.max(0,sh.fuel-0.009);
  if(sh.fuel<1&&G.sT%120===0){G.notif='ТОПЛИВО КОНЧИЛОСЬ: АВАРИЙНЫЙ ХОД X0.3';G.notifT=90;G.notifCol=P.RED;sfxHit();}
  else if(sh.fuel<15&&G.sT%180===0){G.notif='КРИТИЧНЫЙ ТОПЛИВО! ЗАГРУЗИ РЕСУРСЫ НА КОРАБЛЬ';G.notifT=110;G.notifCol=P.RED;}
  else if(sh.fuel<30&&G.sT%200===0){G.notif='ТОПЛИВО КОНЧАЕТСЯ... ОСТАЛОСЬ: '+Math.floor(sh.fuel)+'%';G.notifT=80;G.notifCol=P.ORA;}
  // Энергия теперь регенерируется только от количества рабочих
  p.en=Math.min(p.men,p.en+.18*p.workers);
  if(p.en<15&&G.sT%180===0){G.notif='ЭНЕРГИЯ НИЗКАЯ! ЭКОНОМЬ ВЫСТРЕЛЫ';G.notifT=70;G.notifCol=P.ENL;}
  if(p.shield>0)p.shield--;
  if(p.boost>0)p.boost--;
  if(G.comboT>0)G.comboT--;
  else if(G.combo>1)G.combo=0;

  // Режим посадки
  if(G.appr){
    G.landT++;
    const t=G.landT;
    const rv=Math.min(100,t*0.7);
    const pcx=(LW-42+t*0.15);
    const pcy=(LH/2);
    const tx=Math.min(LW+14,pcx-rv*0.65);
    const ty=pcy;
    const a=Math.min(1,t/280);
    p.x=G.apprSX+(tx-G.apprSX)*a;
    p.y=G.apprSY+(ty-G.apprSY)*a-Math.sin(a*Math.PI)*6;
    p.vx=0;p.vy=0;p.thrT++;
    if(t%2===0){
      const txp=p.x-13;
      PTS.push({x:txp+(Math.random()-.5)*2,y:p.y+(Math.random()-.5)*3,vx:-.8-Math.random()*.8,vy:(Math.random()-.5)*.3,lf:12,ml:16,col:(Math.random()<.5?P.TH1:P.TH2),sz:1,gv:0,fade:.7});
    }
    scrollStars(3+t*.045);
    if(t===55)sfxLand();
    // Удлинённая посадка (было 170 → стало 280) даёт время прочитать брифинг.
    if(t>280){
      if(!G.landingTriggered){
        G.landingTriggered=true;
        startTrans(()=>landOnTargetPlanet(G));
      }
      return;
    }
    updPts();updSHK();updFTX();
    return;
  }

  // Управление
  let ix=0,iy=0;
  if(K.KeyW||K.ArrowUp)iy-=1;
  if(K.KeyS||K.ArrowDown)iy+=1;
  if(K.KeyA||K.ArrowLeft)ix-=1;
  if(K.KeyD||K.ArrowRight)ix+=1;
  if(USE_TOUCH_UI&&TOUCH.joyActive){ix=TOUCH.joyDX;iy=TOUCH.joyDY;}
  const il=Math.hypot(ix,iy)||1;
  const boostOn=(K.ShiftLeft||btnHeld('boost'))&&p.en>10&&sh.fuel>1;
  const thrust=boostOn?.55:.35;
  if(boostOn){p.en-=.5;sh.fuel=Math.max(0,sh.fuel-.055);p.boost=4;}
  if((ix||iy)&&sh.fuel>0)sh.fuel=Math.max(0,sh.fuel-.018);
  p.vx+=(ix/il)*thrust*(ix?1:0);
  p.vy+=(iy/il)*thrust*(iy?1:0);
  // ★ v22 Drift: если только что отпустили буст — держим инерцию 30 кадров (медленнее трение)
  const wasBoosting=p.boostWas;
  p.boostWas=boostOn;
  if(!boostOn&&wasBoosting)p.drift=30; // запускаем drift-окно
  if(p.drift>0){p.drift--;p.vx*=.94;p.vy*=.94;} // мягкое торможение во время drift
  else{p.vx*=.82;p.vy*=.82;}                      // обычное торможение
  const maxSp=boostOn?2.4:(p.drift>0?2.1:1.8);
  const sp=Math.hypot(p.vx,p.vy);
  if(sp>maxSp){p.vx=p.vx/sp*maxSp;p.vy=p.vy/sp*maxSp;}
  p.x=Math.max(12,Math.min(LW*.52,p.x+p.vx));
  p.y=Math.max(20,Math.min(LH-20,p.y+p.vy));
  p.thrT++;

  // Выхлоп двигателя + drift-след (синеватые искры после буста)
  if(G.sT%2===0){
    const tx=p.x-13-(boostOn?4:0);
    PTS.push({x:tx+(Math.random()-.5)*2,y:p.y+(Math.random()-.5)*3,vx:-.8-Math.random()*.8,vy:(Math.random()-.5)*.3,lf:10+Math.random()*6|0,ml:16,col:boostOn?(Math.random()<.5?P.L1:P.L1L):(Math.random()<.5?P.TH1:P.TH2),sz:1,gv:0,fade:.7});
  }
  // ★ v22 Drift trail: пока скользим — редкие голубые частицы по бокам
  if(p.drift>0&&G.sT%3===0){
    const dAlpha=p.drift/30;
    PTS.push({x:p.x-8+(Math.random()-.5)*4,y:p.y+(Math.random()-.5)*6,vx:-p.vx*.3-Math.random()*.4,vy:-p.vy*.3+(Math.random()-.5)*.3,lf:14+Math.random()*8|0,ml:22,col:Math.random()<.5?P.L1L:'#88eeff',sz:1,gv:0,fade:dAlpha*.6});
  }
  drwShipSmoke(p.x,p.y,p.hp/p.mhp);

  // Переключение оружия
  if(KD.Digit1||KD.Numpad1||btnJust('w1')){
    p.wep=1;sfxUI();fText(p.x,p.y-12,'L1',P.L1);
  }
  if(KD.Digit2||KD.Numpad2||btnJust('w2')){
    if(G.campaignState.inventory.laserStrong){
      p.wep=2;sfxUI();fText(p.x,p.y-12,'L2',P.L3);
    }else{
      G.notif='СДЕЛАЙ ЛАЗЕР НА ВЕРСТАКЕ';
      G.notifT=80;G.notifCol=P.YEL;sfxHit();
    }
  }

  // Стрельба
  p.sCD=Math.max(0,p.sCD-1);
  const firing=K.Space||K.KeyZ||(USE_TOUCH_UI&&TOUCH.fire);
  if(firing&&p.sCD===0){
    // ★ v16: Базовый лазер - урон x2 (1→2), расход энергии x1.3 (8→10), дальность x1.6 (32→52, 24→40)
    const ec=[10,44][p.wep-1],cd=[7,28][p.wep-1];
    if(p.en>=ec){
      p.en-=ec;p.sCD=cd;
      G.buls.push({x:p.x+12,y:p.y,vx:[7,5][p.wep-1],lv:p.wep===2?3:1,lf:[52,40][p.wep-1],dmg:[2,10][p.wep-1]*_DEV.dmgMult});
      sfxL(p.wep);
      if(p.wep===2){shake(2.5);flash(.2,P.L3L);}
      spPts(p.x+12,p.y,3,p.wep===1?[P.L1L,P.WHT]:[P.L3L,P.WHT,P.YEL],.3,1.5,6,0);
    }else if(G.sT%15===0){
      fText(p.x,p.y-12,'NET EN',P.ENL);
    }
  }

  // Спавн астероидов
  G.astST--;
  if(G.astST<=0){
    spwnAst(G);
    G.astST=Math.max(8,20+Math.floor(Math.random()*22)-Math.floor(G.prog*12));
  }

  // Спавн пиратов
  G.enmST--;
  if(G.enmST<=0&&G.sT>400){
    spwnPirate(G);
    G.enmST=180+Math.floor(Math.random()*160);
  }

  // Обновление астероидов
  for(let i=G.asts.length-1;i>=0;i--){
    const a=G.asts[i];
    a.x-=a.sp;a.rot+=.5;a.flash*=.8;
    if(a.x<-20){G.asts.splice(i,1);continue;}
    if(p.inv<=0&&Math.abs(p.x-a.x)<a.s+7&&Math.abs(p.y-a.y)<a.s+6){
      if(p.shield>0){
        sfxShield();flash(.3,P.CYA);shake(2);
        p.shield=0;p.inv=25;
        spPts(a.x,a.y,10,[P.CYA,P.WHT],.5,2,16);
        addShockwave(a.x,a.y,12,P.CYA);
        G.asts.splice(i,1);
      }else{
        p.hp-=a.s*2+4;p.inv=55;p.squash=6;
        shake(5);flash(.35,P.HP);sfxHit();G.combo=0;
        spPts(p.x,p.y,14,[P.HP,'#ff8888',P.WHT],1,3.5,20);
        addShockwave(p.x,p.y,14,P.HP);
        hitStopAdd(4);G.asts.splice(i,1);
      }
    }
  }
  if(p.inv>0)p.inv--;
  if(p.squash>0)p.squash--;
  for(let i=G.buls.length-1;i>=0;i--){
    const b=G.buls[i];
    b.x+=b.vx;b.lf--;
    if(b.lf<=0||b.x>LW+20){G.buls.splice(i,1);continue;}
    let hit=false;
    // Попадание по астероидам
    for(let j=G.asts.length-1;j>=0;j--){
      const a=G.asts[j];
      if(Math.abs(b.x-a.x)<a.s+5&&Math.abs(b.y-a.y)<a.s+4){
        a.hp-=b.dmg;a.flash=1;
        // Частицы летят НАЗАД от точки удара (влево), не внутрь астероида
        for(let _pi=0;_pi<4;_pi++){const _ang=Math.PI+(Math.random()-.5)*Math.PI;const _sp=.5+Math.random()*1.5;PTS.push({x:b.x,y:b.y,vx:Math.cos(_ang)*_sp,vy:Math.sin(_ang)*_sp,lf:8+Math.random()*5|0,ml:14,col:[P.A1,P.A3,P.WHT][(Math.random()*3)|0],sz:1+Math.random(),gv:.02,fade:.75});}
        sfxHit();
        if(a.hp<=0){
          spPts(a.x,a.y,10+a.s,[P.ORA,P.YEL,P.WHT,P.TH1],.4,2.5+a.s*.2,18+a.s*2,.04,1.8);
          addShockwave(a.x,a.y,10+a.s*2,P.YEL);
          sfxX(a.s*.2);shake(a.s*.5);flash(a.s*.04,P.YEL);
          hitStopAdd(2);G.combo++;G.comboT=120;
          if(G.combo>1&&G.combo%3===0)
            fText(a.x,a.y-12,'x'+G.combo+'!',G.combo>=9?P.PUR:G.combo>=6?P.YEL:P.CYA);
          if(a.drop)G.rits.push({x:a.x,y:a.y,vx:-.8,vy:(Math.random()-.5)*1.2,lf:250,t:0});
          if(a.s===9&&Math.random()<.25)spwnPowerUp(G,a.x,a.y);
          p.cr+=a.s;fText(a.x,a.y-8,'+'+a.s+'CR',P.YEL);
          G.asts.splice(j,1);
        }
        hit=true;break;
      }
    }
    // Попадание по пиратам
    if(!hit){
      for(let j=G.enms.length-1;j>=0;j--){
        const e=G.enms[j];
        if(Math.abs(b.x-e.x)<8&&Math.abs(b.y-e.y)<5){
          e.hp-=b.dmg;e.flash=1;
          spPts(b.x,b.y,4,[P.PIR3,P.YEL,P.WHT],.4,2,10);
          sfxHit();
          if(e.hp<=0){
            spPts(e.x,e.y,14,[P.PIR3,P.ORA,P.YEL,P.WHT],.6,3,24,.03,1.6);
            addShockwave(e.x,e.y,16,P.PIR3);
            sfxX(.8);shake(3);flash(.3,P.ORA);
            hitStopAdd(3);G.combo+=2;G.comboT=120;
            p.cr+=20;fText(e.x,e.y-8,'+20CR',P.YEL);
            if(Math.random()<.5)spwnPowerUp(G,e.x,e.y);
            G.enms.splice(j,1);
          }
          hit=true;break;
        }
      }
    }
    if(hit){G.buls.splice(i,1);continue;}
  }

  // Обновление пиратов
  for(let i=G.enms.length-1;i>=0;i--){
    const e=G.enms[i];
    e.t++;e.vy=Math.sin(e.t*.05)*.7;
    e.x+=e.vx;e.y+=e.vy;e.flash*=.8;
    if(e.x<-15){G.enms.splice(i,1);continue;}
    e.shootCD--;
    if(e.shootCD<=0&&e.x<LW-10&&e.x>40){
      G.ebuls.push({x:e.x-5,y:e.y,vx:-2.4,vy:(p.y-e.y)*.015});
      e.shootCD=80+Math.random()*60;
      bip(400,.08,.1,'sawtooth',500,200);
    }
    if(p.inv<=0&&Math.abs(p.x-e.x)<10&&Math.abs(p.y-e.y)<7){
      if(p.shield>0){
        sfxShield();flash(.3,P.CYA);shake(2);
        p.shield=0;p.inv=25;
        addShockwave(e.x,e.y,12,P.CYA);
      }else{
        p.hp-=15;p.inv=55;p.squash=6;
        shake(5);flash(.4,P.HP);sfxHit();G.combo=0;hitStopAdd(4);
      }
      spPts(e.x,e.y,12,[P.PIR3,P.ORA,P.WHT],.5,3,20);
      addShockwave(e.x,e.y,14,P.PIR3);
      sfxX(.7);G.enms.splice(i,1);
    }
  }

  // Обновление вражеских снарядов
  for(let i=G.ebuls.length-1;i>=0;i--){
    const b=G.ebuls[i];
    b.x+=b.vx;b.y+=b.vy;
    if(b.x<-10||b.x>LW+10||b.y<10||b.y>LH-10){G.ebuls.splice(i,1);continue;}
    if(p.inv<=0&&Math.hypot(p.x-b.x,p.y-b.y)<(b.kind==='laser'?10:8)){
      if(p.shield>0){
        sfxShield();flash(.2,P.CYA);p.shield=0;p.inv=20;
      }else{
        p.hp-=8;p.inv=40;p.squash=5;shake(3);flash(.3,P.HP);sfxHit();G.combo=0;
      }
      spPts(b.x,b.y,6,[P.PIR3,P.YEL,P.WHT],.4,2,12);
      G.ebuls.splice(i,1);
    }
  }

  // Обновление ресурсов
  for(let i=G.rits.length-1;i>=0;i--){
    const r=G.rits[i];
    r.x+=r.vx;r.y+=r.vy;r.vy*=.98;r.lf--;r.t++;
    const dx=p.x-r.x,dy=p.y-r.y,d=Math.hypot(dx,dy);
    if(d<56){r.vx+=dx/d*.7;r.vy+=dy/d*.7;}
    if(d<10){
      p.res++;sfxPU();
      fText(r.x,r.y,'+RES',P.RES3);
      spPts(r.x,r.y,6,[P.RES,P.RES3,P.WHT],.5,2,14);
      G.rits.splice(i,1);continue;
    }
    if(r.x<-8||r.lf<=0)G.rits.splice(i,1);
  }

  // Обновление пауэрапов — двигаются также как ресурсы (постоянная скорость влево)
  for(let i=G.pups.length-1;i>=0;i--){
    const pu=G.pups[i];
    pu.x+=pu.vx;pu.y+=pu.vy;pu.vy*=.98;pu.t++;pu.lf--;
    const dx=p.x-pu.x,dy=p.y-pu.y,d=Math.hypot(dx,dy);
    if(d<60){pu.vx+=dx/d*.5;pu.vy+=dy/d*.5;}
    if(d<10){
      if(pu.type==='shield'){
        p.shield=600;fText(pu.x,pu.y,'SHIELD!',P.CYA);
      }else if(pu.type==='health'){
        p.hp=Math.min(p.mhp,p.hp+40);fText(pu.x,pu.y,'+40HP',P.HPH);
      }else{
        p.en=Math.min(p.men,p.en+60);fText(pu.x,pu.y,'+60EN',P.EN);
      }
      sfxPU();setTimeout(sfxPU,90);
      flash(.3,pu.type==='shield'?P.CYA:pu.type==='health'?P.HP:P.EN);
      spPts(pu.x,pu.y,14,[pu.type==='shield'?P.CYA:pu.type==='health'?P.HP:P.EN,P.WHT],.5,2.5,20);
      addShockwave(pu.x,pu.y,18,pu.type==='shield'?P.CYA:pu.type==='health'?P.HP:P.EN);
      G.pups.splice(i,1);continue;
    }
    // ★ v16 r9 #9: В финале Тины используем worldBounds, иначе screen-edge
    const wbLeft=(G.finale&&G.finale.worldBounds)?G.finale.worldBounds.minX-20:-10;
    if(pu.x<wbLeft||pu.lf<=0)G.pups.splice(i,1);
  }

  // Прогресс полёта
  const spNow=Math.hypot(p.vx,p.vy);
  const fuelMult=sh.fuel>0?1:0.32;
  const travelMult=(1+(boostOn?1.25:0)+Math.min(1,spNow/2.2)*0.35)*fuelMult;
  G.prog=Math.min(1,G.prog+0.00022*travelMult*_DEV.speedMult);

  // Триггер посадки
  if(G.prog>=1){
    // ★ v16 r12 #4: Для Тины (центр) пропускаем анимацию приближения — сразу старт битвы
    if(G.campaignState.targetPlanet==='center'){
      if(!G.landingTriggered){
        G.landingTriggered=true;
        G.asts.length=0;G.enms.length=0;
        G.ebuls.length=0;G.buls.length=0;
        G.rits.length=0;G.pups.length=0;
        startTrans(()=>landOnTargetPlanet(G));
      }
      return;
    }
    G.appr=true;G.landT=0;
    G.apprSX=p.x;G.apprSY=p.y;
    G.asts.length=0;G.enms.length=0;
    G.ebuls.length=0;G.buls.length=0;
    G.rits.length=0;G.pups.length=0;
    // Запускаем брифинг от пришельца — продолжит работать и после посадки
    G.briefing={t:0,planet:G.campaignState.targetPlanet};
    sfxUI2();
  }

  // Смерть игрока
  if(_DEV.immortal&&p.hp<=0){p.hp=p.mhp;p.en=p.men;p.shield=0;} // DEV: бессмертие
  if(p.hp<=0){
    spPts(p.x,p.y,34,[P.SH1,P.TH1,P.WHT,P.L1],1,5.5,50,.06,2);
    addShockwave(p.x,p.y,40,P.WHT,25);
    sfxX(3);flash(.9,P.WHT);shake(10);
    G.state='gameover';G.goT=0;resetBtns();
    return;
  }

  updPts();updSHK();updFTX();scrollStars();
}

function drwSpace(G){rc(0,0,LW,LH,P.BG);applyShake();drwNebula();drwStars();
  if(G.appr){
    const t=G.landT,rv=Math.min(100,t*.7);
    cx.globalAlpha=Math.min(1,t/50);
    const pcx=(LW-42+t*0.15)|0,pcy=(LH/2)|0;
    const pInfo=PLANETS[G.campaignState.targetPlanet]||PLANETS.drosh;

    if(G.campaignState.targetPlanet==='center'){
      // === ПРИБЛИЖЕНИЕ К ТИНЕ — иконическая сфера Дайсона ===
      // Внешнее свечение (тёмно-красная аура)
      cx.globalAlpha=0.18;disc(pcx,pcy,(rv+24)|0,'#660000');
      cx.globalAlpha=0.30;disc(pcx,pcy,(rv+8)|0,'#aa1100');
      cx.globalAlpha=1;
      // Тёмная сфера
      disc(pcx,pcy,rv|0,'#1a0800');
      disc(pcx,pcy,(rv-3)|0,'#220c00');
      // Гексагональные панели по поверхности
      const hexCount=Math.min(28,Math.max(8,(rv/3)|0));
      for(let i=0;i<hexCount;i++){
        const golden=Math.PI*(3-Math.sqrt(5));
        const k=i/hexCount;
        const phi=Math.acos(1-2*k);
        const theta=golden*i+t*.012;
        const sx=pcx+Math.sin(phi)*Math.cos(theta)*(rv-3);
        const sy=pcy+Math.sin(phi)*Math.sin(theta)*(rv-3);
        const depth=Math.cos(phi);
        if(depth<-0.05)continue;
        const brightness=Math.max(0.3,depth);
        const litUp=(i+Math.floor(t*0.04))%4===0;
        let panelCol;
        if(litUp){
          panelCol=t%30<8?'#ff8833':'#ff4422';
        }else{
          const cv=Math.floor(50+brightness*100);
          panelCol='rgb('+cv+','+(cv*0.3|0)+','+(cv*0.1|0)+')';
        }
        cx.fillStyle=panelCol;
        const pSize=Math.max(1.5,rv*0.07);
        cx.beginPath();
        for(let h=0;h<6;h++){
          const ha=h/6*Math.PI*2;
          const hx=sx+Math.cos(ha)*pSize*brightness;
          const hy=sy+Math.sin(ha)*pSize*brightness;
          if(h===0)cx.moveTo(hx,hy);else cx.lineTo(hx,hy);
        }
        cx.closePath();cx.fill();
        cx.strokeStyle='#0a0400';cx.lineWidth=0.5;cx.stroke();
      }
      // Большие "пушечные" порты на экваторе
      const portCount=Math.max(4,Math.min(8,(rv/12)|0));
      for(let i=0;i<portCount;i++){
        const a=i/portCount*Math.PI*2+t*.008;
        const gx=pcx+Math.cos(a)*rv;
        const gy=pcy+Math.sin(a)*rv;
        const pSz=Math.max(2,(rv*0.06)|0);
        rc((gx-pSz)|0,(gy-pSz)|0,pSz*2,pSz*2,'#330800');
        rc((gx-pSz+1)|0,(gy-pSz+1)|0,pSz*2-2,pSz*2-2,'#aa3322');
        if((t+i*7)%50<10){
          cx.globalAlpha=.7;
          rc((gx-1)|0,(gy-1)|0,2,2,'#ff6633');
          cx.globalAlpha=1;
        }
      }
      // Просвет в центре — звезда
      cx.globalAlpha=0.4+0.2*Math.sin(t*.10);
      const coreSz=Math.max(2,(rv*0.18)|0);
      disc(pcx,pcy,coreSz,'#aa3322');
      disc(pcx,pcy,(coreSz*0.6)|0,'#ff8844');
      cx.globalAlpha=1;
      // Энергетические лучи
      for(let i=0;i<8;i++){
        const a=i/8*Math.PI*2+t*.006;
        cx.globalAlpha=.30+.18*Math.sin(t*.05+i);
        cx.strokeStyle='#ff8844';cx.lineWidth=1;
        cx.beginPath();
        cx.moveTo(pcx+Math.cos(a)*rv,pcy+Math.sin(a)*rv);
        cx.lineTo(pcx+Math.cos(a)*(rv+12),pcy+Math.sin(a)*(rv+12));
        cx.stroke();
      }
      cx.globalAlpha=1;
    }else{
      // === ПРИБЛИЖЕНИЕ К ОБЫЧНОЙ ПЛАНЕТЕ ===
      disc(pcx,pcy,(rv+18)|0,pInfo.approachAtmo);
      disc(pcx,pcy,rv|0,pInfo.approachCol);
      disc(pcx-(rv*.3)|0,(pcy-rv*.2)|0,(rv*.3)|0,pInfo.approachCap);
      disc(pcx+(rv*.1)|0,(pcy+rv*.4)|0,(rv*.2)|0,pInfo.approachCap);
      disc(pcx,(pcy-rv*.72)|0,(rv*.26)|0,pInfo.approachCap);
      cx.globalAlpha=.3;ring(pcx,pcy,(rv+4)|0,pInfo.approachCap,2);
      cx.globalAlpha=1;
    }
    // === ВЕРХ: НАЗВАНИЕ ПЛАНЕТЫ ===
    if(t>38){
      cx.globalAlpha=Math.min(1,(t-38)/22);
      txcs(pInfo.arrivedText,24,G.campaignState.targetPlanet==='center'?'#ff4422':pInfo.approachCap,P.BLK,2);
      cx.globalAlpha=1;
    }

    // === АЛЬФА-СИГНАЛ ОТ ПРИШЕЛЬЦА (брифинг) — отрисовывается через drwAlienBriefing ===
    // Вынесен в отдельную функцию, чтобы продолжать показ после посадки на планете.
  }
  for(const pu of G.pups)drwPowerUp(pu);
  for(const r of G.rits)drwRes(r);
  for(const a of G.asts)drwAst(a);
  for(const b of G.buls)drwBul(b);
  for(const e of G.enms)drwPirate(e);
  for(const b of G.ebuls)drwEnemyBul(b);
  drwPts();drwSHK();
  let shipA=1;
  if(G.appr){shipA=Math.max(0,Math.min(1,1-Math.max(0,(G.landT-220))/55));shipA=shipA*shipA;}
  cx.globalAlpha=shipA;
  // ★ v22 Squash: при ударе корабль сжимается на 1–6 кадров (scaleX 0.72, scaleY 1.28)
  const sq=G.pl.squash;
  if(sq>0){
    const t=sq/6; // 1.0→0
    cx.save();
    cx.translate(G.pl.x|0,G.pl.y|0);
    cx.scale(1-0.28*t,1+0.28*t);
    cx.translate(-(G.pl.x|0),-(G.pl.y|0));
    drwShip(G.pl.x,G.pl.y,G.pl.inv,G.pl.thrT,G.pl.boost>0,G.pl.hp/G.pl.mhp);
    cx.restore();
  }else{
    drwShip(G.pl.x,G.pl.y,G.pl.inv,G.pl.thrT,G.pl.boost>0,G.pl.hp/G.pl.mhp);
  }
  if(G.pl.shield>0)drwShield(G.pl.x,G.pl.y,G.sT);
  cx.globalAlpha=1;
  drwFTX();drawFlash();clearShake();drwHUD(G);
  drwAlienBriefing(G);
  drwPauseIcon();drwJoystick();drwActionBtns();
  if(G.paused)drwPauseOverlay(G);
  drwTutorial(G);drawTrans();
}
function dlgCurrentLines(G){const d=G.dlg;if(!d)return[];const node=d.mode==='graph'?d.graph.nodes[d.node]:null;return d.mode==='graph'?(node&&node.text?node.text:[]):(d.lines||[]);}
function confirmChoice(G,node){const d=G.dlg;const choice=node.choices[d.choiceIdx];sfxUI2();if(choice.effect)choice.effect(G);if(choice.goto&&d.graph.nodes[choice.goto]){d.node=choice.goto;d.choiceIdx=0;d._ranEffect=false;G.dlgChar=0;}else closeDlg(G);}
function dlgFull(G){const lines=dlgCurrentLines(G);const total=lines.reduce((sum,l)=>sum+l.length,0);return G.dlgChar>=total;}
function closeDlg(G){const prevAllowJoy=G.dlg&&typeof G.dlg.prevAllowJoy==='boolean'?G.dlg.prevAllowJoy:true;G.dlg=null;G.dlgChar=0;setJoyEnabled(prevAllowJoy);if(USE_TOUCH_UI)TOUCH.btns=TOUCH.btns.filter(b=>!b.id.startsWith('ch'));}
function updDialog(G){
  const d=G.dlg;if(!d)return;

  const full=G.dlgChar>=total;

    const graph=d.graph;const node=graph.nodes[d.node];
    if(full){
      // Мобильный выбор ответа: используем хитбоксы из drwDialog (точные координаты под адаптивный диалог)
      if(node.choices&&USE_TOUCH_UI&&mC&&d._choiceBoxes){
        for(let i=0;i<d._choiceBoxes.length;i++){
          const cb=d._choiceBoxes[i];
          if(mX>=8&&mX<=LW-8&&mY>=cb.y0&&mY<=cb.y1){d.choiceIdx=i;confirmChoice(G,node);mC=false;return;}
        }
      }
      if(node.choices){
        if(KD.ArrowUp||KD.KeyW){d.choiceIdx=(d.choiceIdx+node.choices.length-1)%node.choices.length;sfxUI();}
        if(KD.ArrowDown||KD.KeyS){d.choiceIdx=(d.choiceIdx+1)%node.choices.length;sfxUI();}
        if(KD.Enter||KD.KeyE||btnJust('int')||(!d.noSpaceConfirm&&KD.Space)){confirmChoice(G,node);return;}
        for(let i=0;i<node.choices.length;i++)if(btnJust('ch'+i)){d.choiceIdx=i;confirmChoice(G,node);return;}
      }else{
        const advance=KD.Enter||KD.KeyE||btnJust('int')||mC||(!d.noSpaceConfirm&&KD.Space);
        if(advance){mC=false;if(node.effect)node.effect(G);if(node.end)closeDlg(G);else if(node.goto&&graph.nodes[node.goto]){d.node=node.goto;d.choiceIdx=0;G.dlgChar=0;sfxUI2();}else closeDlg(G);}
      }
    }else{
      const skip=KD.Enter||KD.KeyE||btnJust('int')||mC||(!d.noSpaceConfirm&&KD.Space);
      if(skip){mC=false;G.dlgChar=total+5;sfxUI();}
      else G.dlgChar+=2;
    }
    return;
  }
  // Обычные реплики NPC.
  if(full){
    const advance=KD.Enter||KD.KeyE||btnJust('int')||mC||(!d.noSpaceConfirm&&KD.Space);
    if(advance){mC=false;if(d.cb)d.cb(G);closeDlg(G);}
  }else{
    const skip=KD.Enter||KD.KeyE||btnJust('int')||mC||(!d.noSpaceConfirm&&KD.Space);
    if(skip){mC=false;G.dlgChar=total+5;sfxUI();}
    else G.dlgChar+=2;
  }
}
// Разбивает строку на несколько по максимальной ширине (в пикселях)
function wrapText(text, maxWidth){
  const words=text.split(' ');
  const lines=[];let cur='';
  for(const w of words){
    const candidate=cur?cur+' '+w:w;
    if(gw(candidate)<=maxWidth){cur=candidate;}
    else{
      if(cur)lines.push(cur);
      // Если одно слово длиннее ширины — обрезаем по символам
      if(gw(w)>maxWidth){
        let chunk='';
        for(const ch of w){
          if(gw(chunk+ch)<=maxWidth)chunk+=ch;
          else{if(chunk)lines.push(chunk);chunk=ch;}
        }
        cur=chunk;
      }else cur=w;
    }
  }
  if(cur)lines.push(cur);
  return lines;
}

function drwDialog(G){
  const d=G.dlg;if(!d)return;
  const rawLines=dlgCurrentLines(G);if(!rawLines.length)return;
  const innerPad=12;
  const innerW=LW-12-innerPad*2;
  // Переносим каждую строку диалога с учётом ширины окна
  const lines=[];
  for(const l of rawLines){
    const wrapped=wrapText(l, innerW);
    for(const w of wrapped)lines.push(w);
  }
  // Рассчитаем выборы и их высоту
  let choices=null,choiceLines=null;
  if(d.mode==='graph'){
    const node=d.graph.nodes[d.node];
    if(node&&node.choices)choices=node.choices;
  }
  if(choices){
    choiceLines=[];
    for(const ch of choices){
      const wrapped=wrapText(ch.label, innerW-10);
      choiceLines.push(wrapped);
    }
  }
  // Высота окна: padding + строки текста + (если есть варианты) разделитель + строки выбора + footer
  const lineH=9;
  const choiceLineH=8;
  const textH=lines.length*lineH;
  const totalChoiceLines=choiceLines?choiceLines.reduce((s,c)=>s+c.length,0):0;
  const choiceBlockH=choiceLines?(totalChoiceLines*choiceLineH+(choiceLines.length-1)*2+6):0;
  const footerH=10;
  let bh=4+textH+(choices?(4+choiceBlockH):0)+footerH;
  bh=Math.max(48,Math.min(LH-22,bh));
  const by=LH-bh-4;
  // Тело окна
  bx2(6,by,LW-12,bh,P.DLG,P.DLB,1);
  cx.strokeStyle='#0066bb';cx.lineWidth=.5;cx.strokeRect(7,by+1,LW-14,bh-2);
  rc(6,by,3,1,P.CYA);rc(6,by,1,3,P.CYA);rc(LW-9,by,3,1,P.CYA);rc(LW-7,by,1,3,P.CYA);
  rc(6,by+bh-1,3,1,P.CYA);rc(6,by+bh-3,1,3,P.CYA);rc(LW-9,by+bh-1,3,1,P.CYA);rc(LW-7,by+bh-3,1,3,P.CYA);
  // Текст с typewriter эффектом по сырым символам (без учёта переносов)
  const totalShow=Math.floor(G.dlgChar);
  let drawnSoFar=0;
  // Чтобы typewriter работал последовательно, считаем заранее символы каждой строки
  let charBudget=totalShow;
  for(let i=0;i<lines.length;i++){
    const l=lines[i];
    const showLen=Math.max(0,Math.min(l.length,charBudget));
    const toShow=l.substring(0,showLen);
    // Цвет: первая исходная строка (имя говорящего) выделяется. Делаю эвристику — если сырая строка перенеслась на несколько, первая получает имя.
    const col=(i===0)?P.UIT:P.WHT;
    txt(toShow,innerPad,by+4+i*lineH,col,1);
    charBudget-=l.length;
    if(charBudget<=0)break;
  }
  // Считаем суммарное количество символов для проверки "печать завершена"
  const totalChars=lines.reduce((s,l)=>s+l.length,0);
  const doneTyping=G.dlgChar>=totalChars;

  if(choices&&doneTyping){
    let yC=by+4+textH+4;
    rc(innerPad-2,yC-2,LW-innerPad*2+4,choiceBlockH+1,'#001224');
    // Сохраняем хитбоксы для тача
    d._choiceBoxes=[];
    for(let i=0;i<choices.length;i++){
      const isSel=i===d.choiceIdx;
      const blink=isSel&&Math.floor(Date.now()/240)%2;
      const col=isSel?P.YEL:P.UIT2;
      const wrapped=choiceLines[i];
      const startY=yC;
      for(let lj=0;lj<wrapped.length;lj++){
        if(lj===0&&isSel)txt('>',innerPad,yC,blink?P.WHT:col,1);
        txt(wrapped[lj],innerPad+8,yC,col,1);
        yC+=choiceLineH;
      }
      const endY=yC;
      d._choiceBoxes.push({y0:startY-2,y1:endY+1});
      yC+=2; // gap between choices
    }
    if(USE_TOUCH_UI){
      for(let i=0;i<choices.length;i++){
        const id='ch'+i;let b=getBtn(id);
        const box=d._choiceBoxes[i];
        const cy=(box.y0+box.y1)/2;
        if(!b){b=addBtn(id,LW/2,cy,60,'',P.CYA);b.hidden=true;}
        else{b.y=cy;}
      }
    }
    if(Math.floor(Date.now()/280)%2){
      const hint=USE_TOUCH_UI?'ТАП ВАРИАНТ':'UP/DN + ENTER';
      txs(hint,LW-gw(hint)-innerPad,by+bh-9,P.YEL,P.BLK,1);
    }
    return;
  }
  if(Math.floor(Date.now()/280)%2){
    const hint=doneTyping?'[OK]':'...';
    txs(hint,LW-gw(hint)-innerPad,by+bh-9,doneTyping?P.YEL:P.UIT3,P.BLK,1);
  }
}

// ======= NPC DROSH =======
function klirrGraph(){

function drwDome(dcx,dcy,r){
  // === СНЕЖНЫЙ ХОЛМ-ОСНОВАНИЕ (под куполом) ===
  // Большой ледяной холм, на котором стоит купол. Идёт ВНИЗ от dcy.
  const hillH=Math.max(8,(r*0.55)|0);
  const hillW=r+8;
  // Тёмная тень холма (земля)
  cx.globalAlpha=0.5;
  for(let dy=0;dy<hillH+2;dy++){
    const w=hillW*(1-dy/(hillH+4))|0;
    cx.fillStyle='#0a1830';
    cx.fillRect((dcx-w-1)|0,(dcy+dy)|0,w*2+2,1);
  }
  cx.globalAlpha=1;
  // Тело холма — лёд
  for(let dy=0;dy<hillH;dy++){
    const w=hillW*(1-dy/(hillH+3))|0;
    cx.fillStyle=dy<2?'#dde8f2':(dy<5?'#a8c0d8':'#7a98b8');
    cx.fillRect((dcx-w)|0,(dcy+dy)|0,w*2,1);
  }
  // Снежная "шапка" вершины холма (под куполом)
  cx.fillStyle='#ffffff';
  cx.fillRect((dcx-r-2)|0,(dcy-1)|0,r*2+4,2);
  cx.fillStyle='#cce0ee';
  cx.fillRect((dcx-r-3)|0,(dcy+1)|0,r*2+6,1);
  // Декоративные ледяные глыбы у подножия
  for(let i=-1;i<=1;i+=2){
    const bx=dcx+i*(r+2);
    cx.fillStyle='#a8c0d8';rc(bx-2,dcy+hillH-3,4,3,'#a8c0d8');
    rc(bx-1,dcy+hillH-4,2,1,'#dde8f2');
  }

  // === ТЕНЬ ПОД КУПОЛОМ (на холме) ===
  cx.globalAlpha=0.35;disc(dcx+1,dcy-1,r-1,P.BLK);cx.globalAlpha=1;

  // === ОСНОВАНИЕ КУПОЛА — каменный фундамент ===
  // Узкая тёмная полоса фундамента непосредственно под куполом
  rc(dcx-r,dcy-1,r*2,2,'#1a2840');
  rc(dcx-r+1,dcy-1,r*2-2,1,'#2a3a55');

  // === КУПОЛ (полусфера) ===
  // Тёмная подложка
  cx.fillStyle=P.DOM;
  for(let dy=-r;dy<=0;dy++){
    const w=Math.sqrt(r*r-dy*dy)|0;
    cx.fillRect((dcx-w)|0,(dcy+dy)|0,w*2,1);
  }
  // Светлая левая часть (свет)
  cx.fillStyle=P.DO2;
  for(let dy=-r;dy<=0;dy++){
    const w=Math.sqrt(r*r-dy*dy)|0;
    cx.fillRect((dcx-w)|0,(dcy+dy)|0,Math.ceil(w*.42),1);
  }
  // Самая светлая полоска сверху-слева — блик
  cx.fillStyle=P.DOG;
  for(let dy=-r;dy<-r*.5;dy++){
    const w=Math.sqrt(r*r-dy*dy)|0;
    cx.fillRect((dcx-w+2)|0,(dcy+dy)|0,Math.ceil(w*.18),1);
  }
  // Контур купола (металлические дуги)
  cx.strokeStyle='#0a1828';cx.lineWidth=1;
  cx.beginPath();cx.arc(dcx,dcy,r,Math.PI,0);cx.stroke();
  // Вертикальный шов посередине
  line(dcx,dcy-r,dcx,dcy,'#1a2a40',1);

  // === ОКНА — светящиеся проёмы ===
  const lit=Math.floor(Date.now()/800)%3!==0;
  const winY=(dcy-r*0.55)|0;
  rc(dcx-9,winY,5,4,'#0a1828');rc(dcx+4,winY,5,4,'#0a1828');
  rc(dcx-8,winY+1,3,2,lit?'#ffeebb':'#88aaff');
  rc(dcx+5,winY+1,3,2,lit?'#ffcc66':'#88aaff');
  // Маленькое окно по центру
  rc(dcx-1,winY-1,2,2,'#0a1828');
  if(lit)rc(dcx-1,winY-1,2,1,'#ffeebb');

  // === АНТЕННА ===
  rc(dcx-1,(dcy-r-5)|0,2,5,'#445566');
  rc(dcx,(dcy-r-7)|0,1,3,P.DOG);
  // Мигалка
  if(Math.floor(Date.now()/400)%2)rc(dcx,(dcy-r-8)|0,1,1,P.RED);
  else rc(dcx,(dcy-r-8)|0,1,1,'#440000');

  // === ВЕНТИЛЯЦИОННЫЕ ТРУБЫ ПО БОКАМ ===
  rc(dcx-r-1,dcy-3,2,3,'#445566');
  rc(dcx+r-1,dcy-3,2,3,'#445566');
}
// === Детализированные NPC ===
// Каждый NPC имеет уникальный силуэт, аксессуары, и собственную walk-анимацию.
function drwNPC(n,pcx,pcy,t){
  // Walking animation - update wander state
  if(n.walking==null){
    // Один раз инициализируем walk-параметры на основе id
    n.walking=true;
    n._wT=Math.random()*100;
    n._wDir=Math.random()<0.5?-1:1;
    n._wWait=0;
    n._wFacing=n._wDir;
    n._homeX=n.x;
    n._homeY=n.y;
    // wRadius может быть передан в NPC defs (для ограничения на платформах)
    n._wRadius=(n.wRadius!=null)?n.wRadius:(20+Math.random()*15);
  }
  // Двигаемся только если игрок не близко (чтобы не "убегать")
  const distToPlayer=Math.hypot(pcx-n.x,pcy-n.y);
  const npcCanWalk=n.walking&&distToPlayer>30&&!n.near;
  // Zorp — бегун: двигается быстрее и почти не отдыхает
  const isRunner=n.id==='zorp';
  const moveSp=isRunner?0.65:0.25;
  const pauseChance=isRunner?0.0015:0.005;
  if(npcCanWalk){
    n._wT++;
    if(n._wWait>0)n._wWait--;
    else{
      // Двигаемся в текущем направлении
      n.x+=n._wDir*moveSp;
      n._wFacing=n._wDir;
      // Если ушли слишком далеко от дома — разворачиваем
      if(n.x<n._homeX-n._wRadius){n._wDir=1;n._wWait=isRunner?5+((Math.random()*15)|0):20+((Math.random()*40)|0);}
      else if(n.x>n._homeX+n._wRadius){n._wDir=-1;n._wWait=isRunner?5+((Math.random()*15)|0):20+((Math.random()*40)|0);}
      // Случайные паузы
      else if(Math.random()<pauseChance){n._wWait=isRunner?5+((Math.random()*15)|0):20+((Math.random()*60)|0);if(Math.random()<0.5)n._wDir*=-1;}
    }
  }
  n.near=Math.abs(pcx-n.x)<22&&Math.abs(pcy-n.y)<22;
  const facing=n._wFacing||1;
  const blink=Math.floor(t/60)%4===0;
  const walkPhase=npcCanWalk&&n._wWait<=0;
  // Blab бежит — быстрее анимация ног и подскок
  const legCycle=isRunner?5:8;
  const legOff=walkPhase?(Math.floor(t/legCycle)%2)*(isRunner?3:2):0;
  // Подскок при беге
  const runBob=(walkPhase&&isRunner)?Math.sin(t*0.4)*1:0;
  const x=n.x|0;
  const y=(n.y+runBob)|0;
  // Тень
  cx.fillStyle='rgba(0,0,0,0.28)';cx.fillRect(x-5,y+3,11,2);

  // Зеркальное отображение в зависимости от направления движения
  const flip=(facing>0)?1:-1;
  cx.save();cx.translate(x,0);cx.scale(flip,1);

  // Диспетчер по id — у каждого свой стиль (рисуем в локальных координатах x=0).
  // Внутри передаём facing=1: вся асимметрия рисуется "лицом вправо",
  // а внешняя обёртка зеркалит всё целиком если NPC смотрит влево.
  switch(n.id){
    case 'klirr': drwNPC_Klirr(0,y,t,1,blink,walkPhase,legOff);break;
    case 'zorp':  drwNPC_Zorp(0,y,t,1,blink,walkPhase,legOff);break;
    case 'krok':  drwNPC_Krok(0,y,t,1,blink,walkPhase,legOff);break;
    case 'blab':  drwNPC_Blab(0,y,t,1,blink,walkPhase,legOff);break;
    case 'pfft':  drwNPC_Pfft(0,y,t,1,blink,walkPhase,legOff);break;
    case 'mrau':  drwNPC_Mrau(0,y,t,1,blink,walkPhase,legOff);break;
    case 'kruz':  drwNPC_Kruz(0,y,t,1,blink,walkPhase,legOff);break;
    default: drwNPC_Generic(0,y,t,1,blink,walkPhase,legOff,n.col);
  }

  cx.restore();

  // Спецэффекты, требующие мировых координат (после восстановления контекста)
  if(n.id==='zorp'&&walkPhase&&t%5===0){
    PTS.push({x:x-facing*4,y:y+2,vx:-facing*0.6,vy:-0.1,lf:8,ml:12,col:'#88ccff',sz:1,gv:0,fade:0.6});
  }

  const nw=gw(n.name);txs(n.name,(x-nw/2)|0,y-26,P.UIT2,P.BLK,1);
  if(n.near&&Math.floor(t/18)%2){
    const bob=Math.sin(t*.15)*1;
    bx2(x-6,y-34+bob,12,10,P.YEL,P.WHT,1);
    txt(USE_TOUCH_UI?'*':'E',x-2,y-32+bob,P.BLK,1);
  }

  // === КВЕСТ-ИНДИКАТОР (восклицательный знак) ===
  // Появляется над NPC если у него есть нужный квест/важная информация для игрока.
  // Скрывается когда игрок рядом (заменяется на E-prompt) или когда квест уже принят.
  if(!n.near&&n.questAvailable&&n.questAvailable(window.G)){
    drwExclaim(x,y-38,t);
  }
}

function drwNPC_Generic(x,y,t,facing,blink,walking,legOff,col){
  // Тело (одеяние)
  rc(x-3,y-8,7,8,col);rc(x-3,y-8,7,1,'#ffddaa');
  // Голова
  rc(x-2,y-15,5,7,col);rc(x-2,y-15,5,1,'#ffddaa');
  // Глаза
  cx.fillStyle=P.BLK;
  if(!blink){cx.fillRect(x-1+(facing>0?0:0),y-13,1,2);cx.fillRect(x+1,y-13,1,2);}
  else{cx.fillRect(x-1,y-12,1,1);cx.fillRect(x+1,y-12,1,1);}
  cx.fillRect(x-1,y-10,3,1);
  // Ноги
  cx.fillStyle='#334455';
  cx.fillRect(x-3+legOff,y,3,2);
  cx.fillRect(x+1-legOff,y,3,2);
}

  // Знаки различия (две жёлтые полоски)

// ЗОРП — спортсмен в трико с повязкой и часами
function drwNPC_Zorp(x,y,t,f,blink,walking,legOff){
  // Ноги — длинные, в кроссовках
  rc(x-3+legOff,y,3,3,'#1a2a4a');// шорты-низ

function drwPC(pc,t){
  const x=pc.x|0,y=pc.y|0;
  const st=Math.floor(pc.wt/5)%4;
  const moving=pc.wt>0;
  const bob=moving?Math.sin(pc.wt*.25)*0.5:0;
  // Дополнительный подскок при беге
  const armSwing=moving?Math.sin(pc.wt*.32)*1:0;
  const ly=(y-bob)|0;
  const flip=(pc.facing===1)?1:-1;
  cx.save();cx.translate(x,0);cx.scale(flip,1);

  // === ТЕНЬ ===
  cx.fillStyle='rgba(0,0,0,0.32)';
  cx.fillRect(-4,ly+5,9,2);
  cx.fillRect(-3,ly+6,7,1);

  // === НОГИ ===
  cx.fillStyle='#1a3380';  // тёмно-синие штаны
  if(st===0||st===2){
    cx.fillRect(-3,ly,3,5);cx.fillRect(1,ly,3,5);
    // Ботинки
    cx.fillStyle='#221122';
    cx.fillRect(-3,ly+4,3,1);cx.fillRect(1,ly+4,3,1);
  }else if(st===1){
    cx.fillRect(-4,ly,3,6);cx.fillRect(2,ly,3,4);
    cx.fillStyle='#221122';
    cx.fillRect(-4,ly+5,3,1);cx.fillRect(2,ly+3,3,1);
  }else{
    cx.fillRect(-4,ly,3,4);cx.fillRect(2,ly,3,6);
    cx.fillStyle='#221122';
    cx.fillRect(-4,ly+3,3,1);cx.fillRect(2,ly+5,3,1);
  }

  // === КОРПУС / СКАФАНДР ===
  // Основной костюм - двухтоновый синий
  rc(-3,ly-8,7,9,'#2266cc');
  // Светлая верхняя часть - наплечники
  rc(-3,ly-8,7,2,'#3377dd');
  rc(-3,ly-8,7,1,'#4488ee');
  // Жёлтая полоса на груди (ремень)
  rc(-3,ly-3,7,1,'#ffcc44');
  rc(-1,ly-3,1,1,'#ffeecc'); // пряжка
  // Карман на боку
  rc(-3,ly-5,2,2,'#1144aa');
  // Ассиметричная нашивка (плечо)
  rc(2,ly-7,2,2,'#ff4488');
  rc(2,ly-6,2,1,'#ffaaaa');

  // === ШЛЕМ ===
  // Тёмная окантовка шлема
  rc(-3,ly-15,7,8,'#1a3380');
  // Внешний шлем
  rc(-2,ly-15,5,7,'#3388ee');
  rc(-2,ly-15,5,1,'#5599ff');
  // Визор - стеклянный
  rc(-1,ly-14,4,5,P.COC);
  // Блики на визоре
  rc(-1,ly-14,1,1,'#aaffdd');
  rc(2,ly-10,1,1,'#88eecc');
  rc(0,ly-13,2,1,'#66ddbb');
  // Антенна на шлеме
  rc(2,ly-17,1,2,'#888899');
  rc(2,ly-18,1,1,'#ff4488');
  // Мигалка антенны
  if(t%30<8)rc(2,ly-18,1,1,'#ffcc44');

  // === РУКИ ===
  cx.fillStyle='#2266cc';
  if(moving){
    // Анимация рук — качаются при беге
    const armOff=armSwing|0;
    if(st<2){
      cx.fillRect(-4,ly-7+armOff,2,4);
      cx.fillRect(5,ly-5-armOff,2,4);
    }else{
      cx.fillRect(-4,ly-5-armOff,2,4);
      cx.fillRect(5,ly-7+armOff,2,4);
    }
    // Перчатки
    cx.fillStyle='#1a3380';
    if(st<2){
      cx.fillRect(-4,ly-4+armOff,2,1);
      cx.fillRect(5,ly-2-armOff,2,1);
    }else{
      cx.fillRect(-4,ly-2-armOff,2,1);
      cx.fillRect(5,ly-4+armOff,2,1);
    }
  }else{
    // Стоит спокойно
    cx.fillRect(-4,ly-7,2,4);
    cx.fillRect(5,ly-7,2,4);
    cx.fillStyle='#1a3380';
    cx.fillRect(-4,ly-4,2,1);
    cx.fillRect(5,ly-4,2,1);
  }

  cx.restore();
}

function startDlg(G,npc){
